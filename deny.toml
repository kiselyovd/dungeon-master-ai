[advisories]
yanked = "deny"
# "workspace" scope: surface unmaintained advisories for workspace members
# and their direct dependencies. Deep transitives (gtk-rs family, unic-*,
# bincode etc. pulled in via tauri) are upstream's problem; flagging them
# here just adds noise we cannot act on. Switch to "all" only if a more
# aggressive policy is wanted.
unmaintained = "workspace"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "Zlib",
    "NCSA",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
