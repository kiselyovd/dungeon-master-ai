name: Setup Linux GUI deps
description: Install the apt packages required to compile src-tauri on Linux runners.

runs:
  using: composite
  steps:
    - name: Install webkit + appindicator + svg
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libssl-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev
