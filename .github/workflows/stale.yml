name: stale

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10
        with:
          days-before-stale: 60
          days-before-close: -1
          stale-issue-message: >
            This issue has had no activity for 60 days. Marking as stale; it will
            stay open. Drop a comment if it is still relevant.
          stale-pr-message: >
            This pull request has had no activity for 60 days. Marking as stale.
            It will stay open; ping a maintainer or push an update to keep it
            current.
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,roadmap,epic,m9-dm,m10-dm
          exempt-pr-labels: pinned,wip
          operations-per-run: 60
