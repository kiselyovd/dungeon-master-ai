name: prebuild-sidecars

# Builds mistralrs-server from source (EricLBuehler/mistral.rs) for all four
# supported targets and uploads the binaries as artifacts so the release
# pipeline can stage them under src-tauri/binaries/ before `tauri build`.
#
# CPU-only build: portable, no GPU toolchain required, ships as the default.
# GPU users build a CUDA binary locally with
# `scripts/build_mistralrs.sh <triple> --cuda` - see spec risk R1: a CUDA CI
# build is intentionally out of scope (GitHub-hosted runners have no GPU and
# the toolkit install is slow and fragile).
#
# Manual trigger only - dispatch it once at the start of Batch B.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-2022, target: x86_64-pc-windows-msvc }
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu }
          - { os: macos-14,     target: aarch64-apple-darwin }
          - { os: macos-13,     target: x86_64-apple-darwin }
    runs-on: ${{ matrix.os }}
    # A cold from-source mistralrs build is heavy and uncached (the build runs
    # in an out-of-workspace clone); 120 min gives slow Windows/macOS runners
    # headroom. The workflow is manual-dispatch only, so the ceiling is free.
    timeout-minutes: 120
    env:
      MISTRALRS_TAG: v0.8.0
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - name: Build mistralrs-server from source
        shell: bash
        run: bash scripts/build_mistralrs.sh "${{ matrix.target }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mistralrs-${{ matrix.target }}
          path: src-tauri/binaries/mistralrs-server-${{ matrix.target }}*
          retention-days: 30
