name: prebuild-sidecars

# Fetches prebuilt mistralrs-server binaries from upstream releases for all
# four supported targets and uploads them as artifacts so the release pipeline
# (Phase I) can stage them under `src-tauri/binaries/` before `tauri build`.
#
# Triggers manually (workflow_dispatch) or whenever the download scripts /
# this workflow itself change. The pinned upstream tag lives in `MISTRALRS_VERSION`.

on:
  workflow_dispatch:
  # Auto-trigger on push intentionally disabled: upstream EricLBuehler/mistral.rs
  # ships source-only releases as of v0.8.0 so the download will always 404
  # until the release pipeline is rewired around a self-built binary. Run
  # this workflow manually once that lands.
  # push:
  #   paths:
  #     - 'scripts/download_mistralrs.*'
  #     - '.github/workflows/prebuild-sidecars.yml'

jobs:
  fetch:
    strategy:
      matrix:
        include:
          - { os: windows-2022, target: x86_64-pc-windows-msvc,   script: download_mistralrs.ps1 }
          - { os: macos-14,     target: aarch64-apple-darwin,     script: download_mistralrs.sh  }
          - { os: macos-13,     target: x86_64-apple-darwin,      script: download_mistralrs.sh  }
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu, script: download_mistralrs.sh  }
    runs-on: ${{ matrix.os }}
    env:
      MISTRALRS_VERSION: v0.8.0
    steps:
      - uses: actions/checkout@v4
      - name: Run download script
        shell: bash
        run: |
          if [[ "${{ matrix.script }}" == *.ps1 ]]; then
            pwsh -NoProfile -File "scripts/${{ matrix.script }}" -Target "${{ matrix.target }}"
          else
            bash "scripts/${{ matrix.script }}" "${{ matrix.target }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: mistralrs-${{ matrix.target }}
          path: src-tauri/binaries/mistralrs-server-${{ matrix.target }}*
          retention-days: 30
