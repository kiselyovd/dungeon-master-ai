name: release

# Triggered on `v*` tag push. Builds the cloud-only Tauri bundle on all four
# supported targets, signs `latest.json` via TAURI_SIGNING_PRIVATE_KEY (so
# the in-app updater works end-to-end), and publishes a GitHub Release with
# the bundles attached.
#
# Optional steps - skipped if the matching secret is missing - cover Windows
# Authenticode signing (WINDOWS_CERT_BASE64 + WINDOWS_CERT_PASSWORD) and
# macOS notarization (APPLE_API_KEY + APPLE_API_KEY_ID + APPLE_API_ISSUER).
# First-GA pet-project releases ship without these; SmartScreen / Gatekeeper
# show "unidentified developer" until a real cert lands.
#
# Local Mode (mistralrs sidecar + Python SDXL sidecar) is intentionally NOT
# bundled - upstream mistral.rs ships source-only releases as of v0.8.0.
# Coming back in a future point release. See docs/RELEASE.md.

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-2022, target: x86_64-pc-windows-msvc, label: windows-x86_64 }
          - { os: macos-14, target: aarch64-apple-darwin, label: darwin-aarch64 }
          - { os: macos-13, target: x86_64-apple-darwin, label: darwin-x86_64 }
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu, label: linux-x86_64 }
    runs-on: ${{ matrix.os }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Linux GUI deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Install bun deps
        run: bun install

      - name: Build cloud-only Tauri bundle (signs latest.json via TAURI_SIGNING_PRIVATE_KEY)
        run: bun run tauri:build:cloud

      - name: Sign Windows binaries
        if: matrix.os == 'windows-2022' && env.WINDOWS_CERT_BASE64 != ''
        shell: pwsh
        run: |
          $cert = [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64)
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP/cert.pfx", $cert)
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName
          Get-ChildItem -Path "src-tauri/target/release/bundle/" -Recurse -Include "*.exe","*.msi" |
            ForEach-Object {
              & $signtool sign /f "$env:RUNNER_TEMP/cert.pfx" /p "$env:WINDOWS_CERT_PASSWORD" /tr http://timestamp.digicert.com /td sha256 /fd sha256 $_.FullName
            }

      - name: Notarize macOS bundle
        if: startsWith(matrix.os, 'macos') && env.APPLE_API_KEY != ''
        shell: bash
        run: |
          BUNDLE=$(find src-tauri/target/release/bundle/macos -name "*.app" | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "no .app bundle found, skipping notarization"
            exit 0
          fi
          ditto -c -k --keepParent "$BUNDLE" "$BUNDLE.zip"
          xcrun notarytool submit "$BUNDLE.zip" \
            --key <(echo "$APPLE_API_KEY" | base64 -d) \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "$BUNDLE"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: src-tauri/target/release/bundle/
          retention-days: 90

  publish:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate latest.json
        run: bun run scripts/build_latest_json.ts > latest.json

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Glob expansion: we want the actual bundle files, not the per-label
          # directories. The download-artifact action puts each artifact in its
          # own subdirectory, so we recurse with `find` and pass the file list.
          mapfile -t BUNDLES < <(find artifacts/release-* -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.sig" \))
          gh release create "${{ github.ref_name }}" \
            --notes-file CHANGELOG.md \
            "${BUNDLES[@]}" latest.json
