name: link-check

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Lychee link check
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # mailto links are excluded by default in this lychee version; the old
          # --exclude-mail flag was removed and made lychee exit non-zero on an
          # arg error, which spuriously opened "broken links" issues (#29, #32).
          args: --no-progress --max-concurrency 16 "**/*.md"
          fail: false
          output: lychee/out.md

      - name: Open / update issue on failure
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6
        with:
          title: "Broken links found by lychee"
          content-filepath: lychee/out.md
          labels: broken-links
