name: prebuild-python-sidecar

# Builds the dmai-image-sidecar PyInstaller bundle (the Python FastAPI image
# sidecar) for Windows and Linux and uploads it as an artifact for the release
# pipeline to stage under src-tauri/binaries/.
#
# CPU-only: the build installs CPU torch wheels, no CUDA toolchain. GPU users
# build a CUDA-capable bundle locally (CUDA torch wheel + the nunchaku wheel
# from nunchaku-tech/nunchaku release assets - see sidecar/requirements.txt).
# This mirrors the prebuild-sidecars (mistralrs) CPU-only-CI decision.
#
# Manual trigger only - the torch/diffusers install is multi-gigabyte and far
# too heavy for per-push CI (spec risk R2). Day-to-day dev does not need this:
# the launcher runs the sidecar straight from the repo .venv when
# DMAI_IMAGE_SIDECAR_DEV is set.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-2022, target: x86_64-pc-windows-msvc }
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'
      - name: Install CPU torch
        shell: bash
        run: pip install --index-url https://download.pytorch.org/whl/cpu torch==2.8.0 torchvision==0.23.0
      - name: Install sidecar dependencies
        shell: bash
        run: pip install -r sidecar/requirements.txt
      - name: Build dmai-image-sidecar (Linux)
        if: runner.os == 'Linux'
        run: bash sidecar/scripts/build.sh "${{ matrix.target }}"
      - name: Build dmai-image-sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./sidecar/scripts/build.ps1 -Target "${{ matrix.target }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dmai-image-sidecar-${{ matrix.target }}
          path: src-tauri/binaries/python_sidecar_${{ matrix.target }}/
          retention-days: 30
