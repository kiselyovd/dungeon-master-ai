name: build-bundle

# Per-push verification that the cloud-only Tauri bundle builds on all four
# supported targets. Local Mode (mistralrs sidecar + Python SDXL sidecar)
# is intentionally skipped here - upstream EricLBuehler/mistral.rs publishes
# source-only releases as of v0.8.0, and the Python sidecar pulls torch +
# diffusers (~5 GB) which would balloon CI time. Both come back in a future
# point release once a real binary plan lands. See docs/RELEASE.md.

on:
  pull_request:
  push:
    branches: [main, m4-local-mode-and-packaging]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-2022, target: x86_64-pc-windows-msvc }
          - { os: macos-14, target: aarch64-apple-darwin }
          - { os: macos-13, target: x86_64-apple-darwin }
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Linux GUI deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Install bun deps
        run: bun install

      - name: Build cloud-only Tauri bundle
        run: bun run tauri:build:cloud

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: src-tauri/target/release/bundle/
          retention-days: 7
