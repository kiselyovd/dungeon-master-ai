name: build-bundle

on:
  pull_request:
  push:
    branches: [main, m4-local-mode-and-packaging]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-2022, target: x86_64-pc-windows-msvc }
          - { os: macos-14, target: aarch64-apple-darwin }
          - { os: macos-13, target: x86_64-apple-darwin }
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Linux GUI deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python sidecar
        shell: bash
        run: |
          cd sidecar
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller==6.10
          pyinstaller --noconfirm --clean build_spec.spec
          mkdir -p ../src-tauri/binaries/python_sidecar_${{ matrix.target }}
          cp -R dist/dmai-image-sidecar/* ../src-tauri/binaries/python_sidecar_${{ matrix.target }}/

      - name: Download mistralrs sidecar
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            pwsh -NoProfile -File scripts/download_mistralrs.ps1 -Target "${{ matrix.target }}"
          else
            bash scripts/download_mistralrs.sh "${{ matrix.target }}"
          fi

      - name: Install bun deps
        run: bun install

      - name: Build (cloud flavor)
        run: bun run tauri:build:cloud

      - name: Build (local flavor)
        run: bun run tauri:build

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: src-tauri/target/release/bundle/
          retention-days: 7
