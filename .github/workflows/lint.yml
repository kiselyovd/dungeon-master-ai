name: lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/setup-linux-gui-deps

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install JS deps
        run: bun install --frozen-lockfile

      # Single source of truth shared with the local pre-commit/pre-push hooks
      # (scripts/gates.sh). --ci-lint = cargo fmt --check + clippy + biome ci +
      # tsc + em-dash. The checks live in gates.sh, not inline, so CI and local
      # hooks can never drift (the cargo-fmt gap that slipped through M11).
      - name: Quality gates (lint)
        run: bash scripts/gates.sh --ci-lint
