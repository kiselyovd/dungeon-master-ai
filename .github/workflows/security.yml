name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # cargo-audit removed: it duplicates cargo-deny (which uses the same RustSec
  # database) and OSV-Scanner (which adds bun.lock coverage) without offering
  # a scope filter, so the gtk-rs / unic-* / bincode transitive tail from the
  # Tauri stack drowned out every real finding. The one real advisory it
  # flagged (rsa 0.9.10 Marvin Attack, transitive via stronghold) is tracked
  # alongside the tauri 2.11.1 upgrade follow-up that OSV-Scanner already
  # surfaces. cargo-deny + OSV-Scanner stay as the dual audit pair.
  cargo-deny:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check all

  gitleaks:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # OSV-Scanner surfaces a meaningful direct hit (tauri 2.10.3 -> 2.11.1 has a
  # CVE) plus a long tail of transitive advisories from the Tauri stack
  # (gtk-rs family, unic-*, paste, proc-macro-error, rsa) that have no fix yet.
  # We track the actionable upgrade as a separate security follow-up; for
  # this CI hardening PR we surface findings without blocking the merge.
  # Flip back to hard-fail (and seed .osv-scanner.toml ignores) once the
  # security cleanup PR lands.
  osv-scanner:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@fa4ff678dd5d0a4fa3d628e57af8162873e93cd6 # main
    with:
      scan-args: |-
        --lockfile=./Cargo.lock
        --lockfile=./bun.lock
      fail-on-vuln: false

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@v4
        # Soft-fail while the repo-level Dependency graph toggle is being
        # rolled out. Flip to a hard failure once Settings -> Security ->
        # Dependency graph is confirmed enabled (Task 12 manual step).
        continue-on-error: true
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
