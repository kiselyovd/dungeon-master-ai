name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  cargo-deny:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all

  gitleaks:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # OSV-Scanner surfaces a meaningful direct hit (tauri 2.10.3 -> 2.11.1 has a
  # CVE) plus a long tail of transitive advisories from the Tauri stack
  # (gtk-rs family, unic-*, paste, proc-macro-error, rsa) that have no fix yet.
  # We track the actionable upgrade as a separate security follow-up; for
  # this CI hardening PR we surface findings without blocking the merge.
  # Flip back to hard-fail (and seed .osv-scanner.toml ignores) once the
  # security cleanup PR lands.
  osv-scanner:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@main
    with:
      scan-args: |-
        --lockfile=./Cargo.lock
        --lockfile=./bun.lock
      fail-on-vuln: false

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        # Soft-fail while the repo-level Dependency graph toggle is being
        # rolled out. Flip to a hard failure once Settings -> Security ->
        # Dependency graph is confirmed enabled (Task 12 manual step).
        continue-on-error: true
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
