name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-linux-gui-deps
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info --no-fail-fast
      - name: Summary
        if: always()
        run: |
          {
            echo "### Rust coverage";
            echo "";
            echo '```';
            cargo llvm-cov report --summary-only;
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          flags: rust
          fail_ci_if_error: false

  frontend-unit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: vitest with coverage
        run: bun run test -- --coverage --reporter=verbose
      - name: Summary
        if: always()
        run: |
          {
            echo "### Frontend coverage";
            echo "";
            if [ -f coverage/coverage-summary.json ]; then
              echo '```json';
              cat coverage/coverage-summary.json;
              echo '```';
            else
              echo "no coverage-summary.json produced";
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  e2e:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
      - name: Run e2e
        run: bunx playwright test
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
