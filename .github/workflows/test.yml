name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-linux-gui-deps
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info --no-fail-fast
      - name: Summary
        if: always()
        run: |
          {
            echo "### Rust coverage";
            echo "";
            echo '```';
            cargo llvm-cov report --summary-only;
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: lcov.info
          flags: rust
          fail_ci_if_error: false

  frontend-unit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install --frozen-lockfile
      - name: vitest with coverage
        run: bun run test -- --coverage --reporter=verbose
      - name: Summary
        if: always()
        run: |
          {
            echo "### Frontend coverage";
            echo "";
            if [ -f coverage/coverage-summary.json ]; then
              echo '```json';
              cat coverage/coverage-summary.json;
              echo '```';
            else
              echo "no coverage-summary.json produced";
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  e2e:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install --frozen-lockfile
      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
      - name: Run e2e
        # Use the package.json script so the e2e/playwright.config.ts path is
        # picked up. A bare `bunx playwright test` would scan from repo root
        # and pull vitest test files instead.
        run: bun run e2e
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: warn
