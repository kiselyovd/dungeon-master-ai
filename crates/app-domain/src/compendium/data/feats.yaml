feats:
  - id: grappler
    name_en: Grappler
    name_ru: Борец
    prerequisites:
      - type: ability_score
        ability: str
        minimum: 13
    asi_grants: []
    effects_en:
      - "You have advantage on attack rolls against a creature you are grappling."
      - "You can use your action to try to pin a creature grappled by you. To do so, make another grapple check. If you succeed, you and the creature are both restrained until the grapple ends."
    effects_ru:
      - "Вы совершаете с преимуществом броски атак по существам, схваченным вами."
      - "Вы можете действием попытаться обездвижить существо, схваченное вами. Для этого совершите ещё одну проверку захвата. В случае успеха вы и это существо становитесь обездвиженными, пока захват не закончится."
    mechanical_hooks:
      advantage_against_grappled: true
      pin_action: true
    source_url: https://5thsrd.org/character/feats/grappler/
    srd_section: "SRD 5.1 §Feats / Grappler"
