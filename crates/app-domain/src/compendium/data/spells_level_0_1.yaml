    name_ru: "Благословение"
    level: 1
    school: enchantment
    casting_time: "1 action"
    range_ft: 30
    components: { v: true, s: true, m: "A sprinkling of holy water." }
    duration: "1 minute"
    ritual: false
    concentration: true
    classes: [cleric, paladin]
    description_en: "You bless up to three creatures of your choice within range. Whenever a target makes an attack roll or a saving throw before the spell ends, the target can roll a d4 and add the number rolled to the attack roll or saving throw."
    description_ru: "Вы благословляете до трёх существ по вашему выбору в пределах дистанции. Каждый раз, когда цель совершает бросок атаки или спасбросок до окончания заклинания, она может бросить 1к4 и прибавить выпавшее число к результату броска атаки или спасброска."
