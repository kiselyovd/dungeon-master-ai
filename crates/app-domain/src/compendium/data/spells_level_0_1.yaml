  - id: sanctuary
    name_en: "Sanctuary"
    name_ru: "Святилище"
    level: 1
    school: abjuration
    casting_time: "1 bonus action"
    range_ft: 30
    components: { v: true, s: true, m: "A small silver mirror." }
    duration: "1 minute"
    ritual: false
    concentration: false
    classes: [cleric]
    description_en: "You ward a creature within range against attack. Until the spell ends, any creature who targets the warded creature with an attack or a harmful spell must first make a wisdom saving throw. On a failed save, the creature must choose a new target or lose the attack or spell. This spell doesn't protect the warded creature from area effects, such as the explosion of a fireball. If the warded creature makes an attack or casts a spell that affects an enemy creature, this spell ends."
    description_ru: "Вы оберегаете существо в пределах дистанции от атаки. До окончания заклинания любое существо, выбирающее охраняемое существо целью атаки или вредоносного заклинания, должно сначала совершить спасбросок Мудрости. При провале существо должно выбрать новую цель или потерять атаку или заклинание. Это заклинание не защищает охраняемое существо от эффектов области, таких как взрыв огненного шара. Если охраняемое существо совершает атаку или накладывает заклинание, влияющее на враждебное существо, заклинание оканчивается."
