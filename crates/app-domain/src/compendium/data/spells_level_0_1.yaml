  - id: alarm
    name_en: "Alarm"
    name_ru: "Тревога"
    level: 1
    school: abjuration
    casting_time: "1 minute"
    range_ft: 30
    components: { v: true, s: true, m: "A tiny bell and a piece of fine silver wire." }
    duration: "8 hours"
    ritual: true
    concentration: false
    classes: [ranger, wizard]
    description_en: "You set an alarm against unwanted intrusion. Choose a door, a window, or an area within range that is no larger than a 20-foot cube. Until the spell ends, an alarm alerts you whenever a Tiny or larger creature touches or enters the warded area. When you cast the spell, you can designate creatures that won't set off the alarm. You also choose whether the alarm is mental or audible. A mental alarm alerts you with a ping in your mind if you are within 1 mile of the warded area. This ping awakens you if you are sleeping. An audible alarm produces the sound of a hand bell for 10 seconds within 60 feet."
    description_ru: "Вы устанавливаете тревогу против непрошеного вторжения. Выберите дверь, окно или область в пределах дистанции, не превышающую куб с длиной ребра 20 футов. Пока заклинание активно, оно оповещает вас каждый раз, когда существо размером не меньше Крошечного касается защищённой области или входит в неё. Накладывая заклинание, вы можете указать существ, которые не будут вызывать тревогу. Вы также выбираете, будет ли тревога мысленной или слышимой. Мысленная тревога оповещает вас сигналом в разуме, если вы находитесь в пределах 1 мили от защищённой области. Этот сигнал пробуждает вас, если вы спите. Слышимая тревога издаёт звук ручного колокольчика в течение 10 секунд в пределах 60 футов."
