  - id: hunters-mark
    name_en: "Hunter's Mark"
    name_ru: "Метка охотника"
    level: 1
    school: divination
    casting_time: "1 bonus action"
    range_ft: 90
    components: { v: true, s: false, m: null }
    duration: "1 hour"
    ritual: false
    concentration: true
    classes: [ranger]
    description_en: "You choose a creature you can see within range and mystically mark it as your quarry. Until the spell ends, you deal an extra 1d6 damage to the target whenever you hit it with a weapon attack, and you have advantage on any Wisdom (Perception) or Wisdom (Survival) check you make to find it. If the target drops to 0 hit points before this spell ends, you can use a bonus action on a subsequent turn of yours to mark a new creature."
    description_ru: "Вы выбираете существо, которое можете видеть в пределах дистанции, и мистически метите его как свою добычу. До окончания заклинания вы причиняете дополнительно 1к6 урона цели при каждом попадании по ней атакой оружием и совершаете с преимуществом любую проверку Мудрости (Восприятие) или Мудрости (Выживание) для её обнаружения. Если хиты цели опускаются до 0 до окончания заклинания, вы можете бонусным действием в свой последующий ход пометить новое существо."
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 3rd or 4th level, you can maintain your concentration on the spell for up to 8 hours. When you use a spell slot of 5th level or higher, you can maintain your concentration on the spell for up to 24 hours."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 3-го или 4-го уровня, вы можете поддерживать концентрацию на заклинании до 8 часов. Если вы используете ячейку 5-го уровня или выше, вы можете поддерживать концентрацию до 24 часов."
    damage: null
    attack: null
    save: null
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/hunters_mark/
    srd_section: "SRD 5.1 §Spells / Hunter's Mark"
  - id: identify
    name_en: "Identify"
    name_ru: "Опознание"
    level: 1
    school: divination
    casting_time: "1 minute"
    range_ft: "Touch"
    components: { v: true, s: true, m: "A pearl worth at least 100gp and an owl feather." }
    duration: "Instantaneous"
    ritual: true
    concentration: false
    classes: [bard, cleric, wizard]
    description_en: "You choose one object that you must touch throughout the casting of the spell. If it is a magic item or some other magic-imbued object, you learn its properties and how to use them, whether it requires attunement to use, and how many charges it has, if any. You learn whether any spells are affecting the item and what they are. If the item was created by a spell, you learn which spell created it. If you instead touch a creature throughout the casting, you learn what spells, if any, are currently affecting it."
    description_ru: "Вы выбираете один предмет, которого должны касаться на протяжении всего наложения заклинания. Если это магический предмет или иной магически наполненный объект, вы узнаёте его свойства и способ их использования, требует ли он настройки и сколько у него зарядов, если они есть. Вы узнаёте, действуют ли на этот предмет какие-либо заклинания и какие именно. Если предмет был создан заклинанием, вы узнаёте, каким. Если же вы коснётесь существа в течение наложения заклинания, вы узнаёте, какие заклинания, если они есть, на него в настоящий момент действуют."
