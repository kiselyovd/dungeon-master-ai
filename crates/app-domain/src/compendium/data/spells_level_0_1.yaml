  - id: thaumaturgy
    name_en: "Thaumaturgy"
    name_ru: "Чудотворство"
    level: 0
    school: transmutation
    casting_time: "1 action"
    range_ft: 30
    components: { v: true, s: false, m: null }
    duration: "1 minute"
    ritual: false
    concentration: false
    classes: [cleric]
    description_en: "You manifest a minor wonder, a sign of supernatural power, within range. You create one of the following magical effects within range. - Your voice booms up to three times as loud as normal for 1 minute. - You cause flames to flicker, brighten, dim, or change color for 1 minute. - You cause harmless tremors in the ground for 1 minute. - You create an instantaneous sound that originates from a point of your choice within range, such as a rumble of thunder, the cry of a raven, or ominous whispers. - You instantaneously cause an unlocked door or window to fly open or slam shut. - You alter the appearance of your eyes for 1 minute. If you cast this spell multiple times, you can have up to three of its 1-minute effects active at a time, and you can dismiss such an effect as an action."
    description_ru: "Вы являете малое чудо, знак сверхъестественной силы, в пределах дистанции. Вы создаёте один из следующих магических эффектов в пределах дистанции: - Ваш голос гремит втрое громче обычного на протяжении 1 минуты. - Вы заставляете пламя мерцать, разгораться, тускнеть или менять цвет на 1 минуту. - Вы вызываете безвредные содрогания земли на 1 минуту. - Вы создаёте мгновенный звук, исходящий из выбранной вами точки в пределах дистанции, такой как раскат грома, крик ворона или зловещий шёпот. - Вы мгновенно заставляете незапертую дверь или окно распахнуться или захлопнуться. - Вы изменяете внешний вид своих глаз на 1 минуту. Если вы накладываете это заклинание несколько раз, у вас одновременно может быть до трёх его минутных эффектов, и вы можете прекратить любой такой эффект действием."
