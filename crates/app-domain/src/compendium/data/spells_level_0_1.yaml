  - id: sleep
    name_en: "Sleep"
    name_ru: "Сон"
    level: 1
    school: enchantment
    casting_time: "1 action"
    range_ft: 90
    components: { v: true, s: true, m: "A pinch of fine sand, rose petals, or a cricket." }
    duration: "1 minute"
    ritual: false
    concentration: false
    classes: [bard, sorcerer, warlock, wizard]
    description_en: "This spell sends creatures into a magical slumber. Roll 5d8; the total is how many hit points of creatures this spell can affect. Creatures within 20 feet of a point you choose within range are affected in ascending order of their current hit points (ignoring unconscious creatures). Starting with the creature that has the lowest current hit points, each creature affected by this spell falls unconscious until the spell ends, the sleeper takes damage, or someone uses an action to shake or slap the sleeper awake. Subtract each creature's hit points from the total before moving on to the creature with the next lowest hit points. A creature's hit points must be equal to or less than the remaining total for that creature to be affected. Undead and creatures immune to being charmed aren't affected by this spell."
    description_ru: "Это заклинание погружает существ в магический сон. Бросьте 5к8; полученная сумма - количество хитов существ, которое это заклинание может затронуть. Существа в пределах 20 футов от точки по вашему выбору в пределах дистанции попадают под действие в порядке возрастания их текущих хитов (бессознательные существа игнорируются). Начиная с существа с наименьшим количеством хитов, каждое существо, затронутое этим заклинанием, оказывается без сознания, пока заклинание не окончится, пока спящий не получит урон, или пока кто-нибудь не разбудит его действием, потряся или ударив. Вычитайте хиты каждого существа из оставшейся суммы перед переходом к существу со следующим наименьшим количеством хитов. Чтобы существо было затронуто, его хиты должны быть равны или меньше оставшейся суммы. Нежить и существа, имеющие иммунитет к очарованию, не затрагиваются этим заклинанием."
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 2nd level or higher, roll an additional 2d8 for each slot level above 1st."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 2-го уровня или выше, бросьте дополнительно 2к8 за каждый уровень ячейки выше 1-го."
    damage: null
    attack: null
    save: null
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/sleep/
    srd_section: "SRD 5.1 §Spells / Sleep"
  - id: speak-with-animals
    name_en: "Speak with Animals"
    name_ru: "Разговор с животными"
    level: 1
    school: divination
    casting_time: "1 action"
    range_ft: "Self"
    components: { v: true, s: true, m: null }
    duration: "10 minutes"
    ritual: true
    concentration: false
    classes: [bard, cleric, druid, ranger]
    description_en: "You gain the ability to comprehend and verbally communicate with beasts for the duration. The knowledge and awareness of many beasts is limited by their intelligence, but at a minimum, beasts can give you information about nearby locations and monsters, including whatever they can perceive or have perceived within the past day. You might be able to persuade a beast to perform a small favor for you, at the DM's discretion."
    description_ru: "Вы получаете способность понимать речь зверей и устно общаться с ними на время действия заклинания. Знания и осведомлённость многих зверей ограничены их разумом, но как минимум звери могут давать вам сведения о близлежащих местах и чудовищах, в том числе о всём, что они могут воспринимать или воспринимали в течение последнего дня. По усмотрению Мастера вы можете убедить зверя оказать вам небольшую услугу."
