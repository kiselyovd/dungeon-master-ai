  - id: find-familiar
    name_en: "Find Familiar"
    name_ru: "Поиск фамильяра"
    level: 1
    school: conjuration
    casting_time: "1 hour"
    range_ft: 10
    components: { v: true, s: true, m: "10 gp worth of charcoal, incense, and herbs that must be consumed by fire in a brass brazier" }
    duration: "Instantaneous"
    ritual: true
    concentration: false
    classes: [wizard]
    description_en: "You gain the service of a familiar, a spirit that takes an animal form you choose: bat, cat, crab, frog (toad), hawk, lizard, octopus, owl, poisonous snake, fish (quipper), rat, raven, sea horse, spider, or weasel. Appearing in an unoccupied space within range, the familiar has the statistics of the chosen form, though it is a celestial, fey, or fiend (your choice) instead of a beast. Your familiar acts independently of you, but it always obeys your commands. In combat, it rolls its own initiative and acts on its own turn. A familiar can't attack, but it can take other actions as normal. When the familiar drops to 0 hit points, it disappears, leaving behind no physical form. It reappears after you cast this spell again. While your familiar is within 100 feet of you, you can communicate with it telepathically. Additionally, as an action, you can see through your familiar's eyes and hear what it hears until the start of your next turn, gaining the benefits of any special senses that the familiar has. During this time, you are deaf and blind with regard to your own senses. As an action, you can temporarily dismiss your familiar. It disappears into a pocket dimension where it awaits your summons. Alternatively, you can dismiss it forever. As an action while it is temporarily dismissed, you can cause it to reappear in any unoccupied space within 30 feet of you. You can't have more than one familiar at a time. If you cast this spell while you already have a familiar, you instead cause it to adopt a new form. Choose one of the forms from the above list. Your familiar transforms into the chosen creature. Finally, when you cast a spell with a range of touch, your familiar can deliver the spell as if it had cast the spell. Your familiar must be within 100 feet of you, and it must use its reaction to deliver the spell when you cast it. If the spell requires an attack roll, you use your attack modifier for the roll."
    description_ru: "Вы получаете услуги фамильяра - духа, принимающего форму животного на ваш выбор: летучая мышь, кошка, краб, лягушка (жаба), ястреб, ящерица, осьминог, сова, ядовитая змея, рыба (килька), крыса, ворон, морской конёк, паук или ласка. Появляясь в свободном пространстве в пределах дистанции, фамильяр имеет характеристики выбранной формы, но является небожителем, феей или исчадием (на ваш выбор) вместо зверя. Ваш фамильяр действует независимо от вас, но всегда подчиняется вашим командам. В бою он бросает свою инициативу и действует в свой собственный ход. Фамильяр не может атаковать, но может совершать прочие действия как обычно. Когда хиты фамильяра опускаются до 0, он исчезает, не оставляя физической формы. Он появляется вновь, когда вы накладываете это заклинание заново. Пока ваш фамильяр находится в пределах 100 футов от вас, вы можете общаться с ним телепатически. Кроме того, действием вы можете видеть глазами своего фамильяра и слышать то, что слышит он, до начала вашего следующего хода, получая преимущества любых особых чувств, которыми обладает фамильяр. В это время вы глухи и слепы по отношению к собственным чувствам. Действием вы можете временно отослать своего фамильяра. Он исчезает в карманном измерении, где ждёт вашего призыва. Также вы можете отослать его навсегда. Действием, пока он временно отослан, вы можете заставить его появиться вновь в любом свободном пространстве в пределах 30 футов от вас. У вас не может быть более одного фамильяра одновременно. Если вы накладываете это заклинание, уже имея фамильяра, вы вместо этого заставляете его принять новую форму. Выберите одну из форм из приведённого выше списка. Ваш фамильяр преобразуется в выбранное существо. Наконец, когда вы накладываете заклинание с дистанцией «Касание», ваш фамильяр может доставить заклинание, как если бы он сам его наложил. Ваш фамильяр должен находиться в пределах 100 футов от вас и должен использовать свою реакцию для доставки заклинания, когда вы его накладываете. Если заклинание требует броска атаки, вы используете свой модификатор атаки."
