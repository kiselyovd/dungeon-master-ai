  - id: mage-hand
    name_en: "Mage Hand"
    name_ru: "Волшебная рука"
    level: 0
    school: conjuration
    casting_time: "1 action"
    range_ft: 30
    components: { v: true, s: true, m: null }
    duration: "1 minute"
    ritual: false
    concentration: false
    classes: [bard, sorcerer, warlock, wizard]
    description_en: "A spectral, floating hand appears at a point you choose within range. The hand lasts for the duration or until you dismiss it as an action. The hand vanishes if it is ever more than 30 feet away from you or if you cast this spell again. You can use your action to control the hand. You can use the hand to manipulate an object, open an unlocked door or container, stow or retrieve an item from an open container, or pour the contents out of a vial. You can move the hand up to 30 feet each time you use it. The hand can't attack, activate magic items, or carry more than 10 pounds."
    description_ru: "В выбранной вами точке в пределах дистанции появляется призрачная парящая рука. Рука существует, пока заклинание не окончится, или пока вы не прекратите его действием. Рука исчезает, если оказывается дальше 30 футов от вас, или если вы накладываете это заклинание ещё раз. Вы можете действием управлять рукой. Вы можете использовать руку для манипуляций с предметом, открывания незапертых дверей или контейнеров, размещения или извлечения предмета из открытого контейнера, или для выливания содержимого пузырька. Каждый раз при использовании руки вы можете переместить её на расстояние до 30 футов. Рука не может атаковать, использовать магические предметы и переносить более 10 фунтов."
    at_higher_levels:
      en: null
      ru: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/mage_hand/
    srd_section: "SRD 5.1 §Spells / Mage Hand"
  - id: mending
    name_en: "Mending"
    name_ru: "Починка"
    level: 0
    school: transmutation
    casting_time: "1 minute"
    range_ft: "Touch"
    components: { v: true, s: true, m: "Two lodestones." }
    duration: "Instantaneous"
    ritual: false
    concentration: false
    classes: [bard, cleric, druid, sorcerer, wizard]
    description_en: "This spell repairs a single break or tear in an object you touch, such as a broken key, a torn cloak, or a leaking wineskin. As long as the break or tear is no longer than 1 foot in any dimension, you mend it, leaving no trace of the former damage. This spell can physically repair a magic item or construct, but the spell can't restore magic to such an object."
    description_ru: "Это заклинание чинит один разлом или разрыв на предмете, к которому вы прикоснулись, например, сломанный ключ, разорванный плащ или прохудившийся бурдюк. Если разлом или разрыв не длиннее 1 фута ни в одном из измерений, вы устраняете его, не оставляя следов прежних повреждений. Это заклинание может физически починить магический предмет или конструкта, но не может восстановить магию таких предметов."
    at_higher_levels:
      en: null
      ru: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/mending/
    srd_section: "SRD 5.1 §Spells / Mending"
  - id: message
    name_en: "Message"
    name_ru: "Послание"
    level: 0
    school: transmutation
    casting_time: "1 action"
    range_ft: 120
    components: { v: true, s: true, m: "A short piece of copper wire." }
    duration: "1 round"
    ritual: false
    concentration: false
    classes: [bard, sorcerer, wizard]
    description_en: "You point your finger toward a creature within range and whisper a message. The target (and only the target) hears the message and can reply in a whisper that only you can hear. You can cast this spell through solid objects if you are familiar with the target and know it is beyond the barrier. Magical silence, 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood blocks the spell. The spell doesn't have to follow a straight line and can travel freely around corners or through openings."
    description_ru: "Вы указываете пальцем на существо в пределах дистанции и шепчете сообщение. Цель (и только цель) слышит это сообщение и может ответить шёпотом, который слышите только вы. Вы можете накладывать это заклинание сквозь твёрдые объекты, если знакомы с целью и знаете, что она находится за барьером. Заклинание блокируется магической тишиной, 1 футом камня, 1 дюймом обычного металла, тонким листом свинца или 3 футами древесины. Заклинанию не нужно следовать по прямой и оно может свободно огибать углы и проникать сквозь отверстия."
    at_higher_levels:
      en: null
      ru: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/message/
    srd_section: "SRD 5.1 §Spells / Message"
  - id: minor-illusion
    name_en: "Minor Illusion"
    name_ru: "Малая иллюзия"
    level: 0
    school: illusion
    casting_time: "1 action"
    range_ft: 30
    components: { v: false, s: true, m: "A bit of fleece." }
    duration: "1 minute"
    ritual: false
    concentration: false
    classes: [bard, sorcerer, warlock, wizard]
    description_en: "You create a sound or an image of an object within range that lasts for the duration. The illusion also ends if you dismiss it as an action or cast this spell again. If you create a sound, its volume can range from a whisper to a scream. It can be your voice, someone else's voice, a lion's roar, a beating of drums, or any other sound you choose. The sound continues unabated throughout the duration, or you can make discrete sounds at different times before the spell ends. If you create an image of an object-such as a chair, muddy footprints, or a small chest-it must be no larger than a 5-foot cube. The image can't create sound, light, smell, or any other sensory effect. Physical interaction with the image reveals it to be an illusion, because things can pass through it. If a creature uses its action to examine the sound or image, the creature can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the illusion becomes faint to the creature."
    description_ru: "Вы создаёте звук или образ предмета в пределах дистанции, существующий пока заклинание активно. Иллюзия также оканчивается, если вы прекращаете её действием или накладываете это заклинание снова. Если вы создаёте звук, его громкость может варьироваться от шёпота до крика. Это может быть ваш голос, чей-то ещё голос, рык льва, барабанный бой или любой другой звук на ваш выбор. Звук непрерывно длится всё время действия заклинания, или же вы можете издавать различные отдельные звуки в разные моменты до окончания заклинания. Если вы создаёте образ предмета - например, стула, грязных отпечатков ног или маленького сундучка, - он должен помещаться в куб с длиной ребра 5 футов. Образ не может создавать звук, свет, запах или какие-либо иные сенсорные эффекты. Физическое взаимодействие с образом выявляет, что это иллюзия, поскольку сквозь него можно проходить. Если существо использует своё действие, чтобы изучить звук или образ, оно может определить, что это иллюзия, успешно совершив проверку Интеллекта (Расследование) против Сл вашего спасброска заклинания. Если существо распознало иллюзию как таковую, она становится для него блёклой."
