    srd_section: "SRD 5.1 §Spells / Grease"
  - id: guiding-bolt
    name_en: "Guiding Bolt"
    name_ru: "Направленный снаряд"
    level: 1
    school: evocation
    casting_time: "1 action"
    range_ft: 120
    components: { v: true, s: true, m: null }
    duration: "1 round"
    ritual: false
    concentration: false
    classes: [cleric]
    description_en: "A flash of light streaks toward a creature of your choice within range. Make a ranged spell attack against the target. On a hit, the target takes 4d6 radiant damage, and the next attack roll made against this target before the end of your next turn has advantage, thanks to the mystical dim light glittering on the target until then."
    description_ru: "Вспышка света устремляется к выбранному вами существу в пределах дистанции. Совершите дальнобойную атаку заклинанием по цели. При попадании цель получает 4к6 урона излучением, и следующий бросок атаки против этой цели до конца вашего следующего хода совершается с преимуществом благодаря мистическому тусклому свету, мерцающему на цели до этого момента."
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 2nd level or higher, the damage increases by 1d6 for each slot level above 1st."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 2-го уровня или выше, урон увеличивается на 1к6 за каждый уровень ячейки выше 1-го."
    damage:
      dice: "4d6"
      type: radiant
    attack:
      kind: ranged_spell
    save: null
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/guiding_bolt/
    srd_section: "SRD 5.1 §Spells / Guiding Bolt"
  - id: healing-word
