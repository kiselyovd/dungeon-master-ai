  - id: protection-from-evil-and-good
    name_en: "Protection from Evil and Good"
    name_ru: "Защита от зла и добра"
    level: 1
    school: abjuration
    casting_time: "1 action"
    range_ft: "Touch"
    components: { v: true, s: true, m: "Holy water or powdered silver and iron, which the spell consumes." }
    duration: "10 minutes"
    ritual: false
    concentration: true
    classes: [cleric, paladin, warlock, wizard]
    description_en: "Until the spell ends, one willing creature you touch is protected against certain types of creatures: aberrations, celestials, elementals, fey, fiends, and undead. The protection grants several benefits. Creatures of those types have disadvantage on attack rolls against the target. The target also can't be charmed, frightened, or possessed by them. If the target is already charmed, frightened, or possessed by such a creature, the target has advantage on any new saving throw against the relevant effect."
    description_ru: "До окончания заклинания одно согласное существо, которого вы касаетесь, защищено от определённых видов существ: аберраций, небожителей, элементалей, фей, исчадий и нежити. Защита даёт несколько преимуществ. Существа этих видов совершают с помехой броски атаки по цели. Цель также не может быть очарована, испугана или одержима ими. Если цель уже очарована, испугана или одержима таким существом, она совершает с преимуществом любые новые спасброски против соответствующего эффекта."
