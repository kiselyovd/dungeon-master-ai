    ritual: false
    concentration: false
    classes: [sorcerer, wizard]
    description_en: "You create three glowing darts of magical force. Each dart hits a creature of your choice that you can see within range. A dart deals 1d4 + 1 force damage to its target. The darts all strike simultaneously, and you can direct them to hit one creature or several."
    description_ru: "Вы создаёте три светящихся дротика из магической силы. Каждый дротик попадает в существо по вашему выбору, которое вы можете видеть в пределах дистанции. Дротик причиняет 1к4 + 1 урона силовым полем своей цели. Все дротики ударяют одновременно, и вы можете направить их в одно существо или в разных."
