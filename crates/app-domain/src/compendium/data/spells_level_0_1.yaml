    name_en: "Fog Cloud"
    name_ru: "Облако тумана"
    level: 1
    school: conjuration
    casting_time: "1 action"
    range_ft: 120
    components: { v: true, s: true, m: null }
    duration: "1 hour"
    ritual: false
    concentration: true
    classes: [cleric, druid, ranger, sorcerer, wizard]
    description_en: "You create a 20-foot-radius sphere of fog centered on a point within range. The sphere spreads around corners, and its area is heavily obscured. It lasts for the duration or until a wind of moderate or greater speed (at least 10 miles per hour) disperses it."
    description_ru: "Вы создаёте сферу из тумана радиусом 20 футов с центром в точке в пределах дистанции. Сфера огибает углы, и её область сильно затенена. Она существует на протяжении длительности заклинания или до тех пор, пока ветер умеренной или большей силы (не менее 10 миль в час) не развеет её."
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 2nd level or higher, the radius of the fog increases by 20 feet for each slot level above 1st."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 2-го уровня или выше, радиус тумана увеличивается на 20 футов за каждый уровень ячейки выше 1-го."
    damage: null
