  - id: floating-disk
    name_en: "Floating Disk"
    name_ru: "Парящий диск Тэнсера"
    level: 1
    school: conjuration
    casting_time: "1 action"
    range_ft: 30
    components: { v: true, s: true, m: "A drop of mercury." }
    duration: "1 hour"
    ritual: true
    concentration: false
    classes: [wizard]
    description_en: "This spell creates a circular, horizontal plane of force, 3 feet in diameter and 1 inch thick, that floats 3 feet above the ground in an unoccupied space of your choice that you can see within range. The disk remains for the duration, and can hold up to 500 pounds. If more weight is placed on it, the spell ends, and everything on the disk falls to the ground. The disk is immobile while you are within 20 feet of it. If you move more than 20 feet away from it, the disk follows you so that it remains within 20 feet of you. If can move across uneven terrain, up or down stairs, slopes and the like, but it can't cross an elevation change of 10 feet or more. For example, the disk can't move across a 10-foot-deep pit, nor could it leave such a pit if it was created at the bottom. If you move more than 100 feet away from the disk (typically because it can't move around an obstacle to follow you), the spell ends."
    description_ru: "Это заклинание создаёт круглую горизонтальную плоскость силы диаметром 3 фута и толщиной 1 дюйм, парящую в 3 футах над землёй в свободном пространстве по вашему выбору, которое вы можете видеть в пределах дистанции. Диск существует на протяжении длительности заклинания и может удерживать до 500 фунтов. Если на него поместить больше веса, заклинание оканчивается, и всё, что было на диске, падает на землю. Диск неподвижен, пока вы находитесь в пределах 20 футов от него. Если вы удаляетесь от него более чем на 20 футов, диск следует за вами так, чтобы оставаться в пределах 20 футов от вас. Он может перемещаться по неровной местности, вверх или вниз по лестницам, склонам и тому подобному, но не способен пересекать перепад высоты в 10 футов или больше. Например, диск не может пересечь яму глубиной 10 футов, как и не может выбраться из такой ямы, если был создан на её дне. Если вы удалитесь от диска более чем на 100 футов (обычно потому, что он не может обогнуть препятствие, следуя за вами), заклинание оканчивается."
