  - id: shillelagh
    name_en: "Shillelagh"
    name_ru: "Дубинка"
    level: 0
    school: transmutation
    casting_time: "1 bonus action"
    range_ft: "Touch"
    components: { v: true, s: true, m: "Mistletoe, a shamrock leaf, and a club or quarterstaff." }
    duration: "1 minute"
    ritual: false
    concentration: false
    classes: [druid]
    description_en: "The wood of a club or a quarterstaff you are holding is imbued with nature's power. For the duration, you can use your spellcasting ability instead of Strength for the attack and damage rolls of melee attacks using that weapon, and the weapon's damage die becomes a d8. The weapon also becomes magical, if it isn't already. The spell ends if you cast it again or if you let go of the weapon."
    description_ru: "Дерево дубинки или боевого посоха, который вы держите, наполняется силой природы. На время действия заклинания вы можете использовать характеристику заклинания вместо Силы для бросков атаки и урона ближнего боя этим оружием, и кость урона оружия становится к8. Оружие также становится магическим, если оно ещё им не является. Заклинание оканчивается, если вы накладываете его снова или выпускаете оружие из рук."
