  - id: hideous-laughter
    name_en: "Hideous Laughter"
    name_ru: "Тошнотворный смех"
    level: 1
    school: enchantment
    casting_time: "1 action"
    range_ft: 30
    components: { v: true, s: true, m: "Tiny tarts and a feather that is waved in the air." }
    duration: "1 minute"
    ritual: false
    concentration: true
    classes: [bard, warlock, wizard]
    description_en: "A creature of your choice that you can see within range perceives everything as hilariously funny and falls into fits of laughter if this spell affects it. The target must succeed on a wisdom saving throw or fall prone, becoming incapacitated and unable to stand up for the duration. A creature with an Intelligence score of 4 or less isn't affected. At the end of each of its turns, and each time it takes damage, the target can make another wisdom saving throw. The target had advantage on the saving throw if it's triggered by damage. On a success, the spell ends."
    description_ru: "Существо на ваш выбор, которое вы можете видеть в пределах дистанции, начинает воспринимать всё как уморительно смешное и впадает в приступы хохота, если заклинание его затронет. Цель должна преуспеть в спасброске Мудрости, иначе упадёт ничком, становясь недееспособной и неспособной встать на время действия заклинания. Существо с показателем Интеллекта 4 или менее не затрагивается. В конце каждого своего хода и каждый раз, получая урон, цель может совершать ещё один спасбросок Мудрости. Цель совершает спасбросок с преимуществом, если он вызван уроном. При успехе заклинание оканчивается."
    at_higher_levels:
      en: null
      ru: null
    damage: null
    attack: null
