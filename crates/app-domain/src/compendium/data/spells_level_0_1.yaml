spells:
  - id: acid-splash
    name_en: "Acid Splash"
    name_ru: "Кислотные брызги"
    level: 0
    school: conjuration
    casting_time: "1 action"
    range_ft: 60
    components: { v: true, s: true, m: null }
    duration: "Instantaneous"
    ritual: false
    concentration: false
    classes: [sorcerer, wizard]
    description_en: "You hurl a bubble of acid. Choose one creature within range, or choose two creatures within range that are within 5 feet of each other. A target must succeed on a dexterity saving throw or take 1d6 acid damage."
    description_ru: "Вы швыряете пузырь кислоты. Выберите одно существо в пределах дистанции или двух существ в пределах дистанции, находящихся в пределах 5 футов друг от друга. Цель должна преуспеть в спасброске Ловкости, иначе получает 1к6 урона кислотой."
    at_higher_levels:
      en: "This spell's damage increases by 1d6 when you reach 5th level (2d6), 11th level (3d6), and 17th level (4d6)."
      ru: "Урон этого заклинания увеличивается на 1к6, когда вы достигаете 5-го уровня (2к6), 11-го уровня (3к6) и 17-го уровня (4к6)."
    damage:
