    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/minor_illusion/
    srd_section: "SRD 5.1 §Spells / Minor Illusion"
  - id: poison-spray
    name_en: "Poison Spray"
    name_ru: "Брызги яда"
    level: 0
    school: conjuration
    casting_time: "1 action"
    range_ft: 10
    components: { v: true, s: true, m: null }
    duration: "Instantaneous"
    ritual: false
    concentration: false
    classes: [druid, sorcerer, warlock, wizard]
    description_en: "You extend your hand toward a creature you can see within range and project a puff of noxious gas from your palm. The creature must succeed on a Constitution saving throw or take 1d12 poison damage."
