    classes: [cleric, druid]
    description_en: "You touch one willing creature. Once before the spell ends, the target can roll a d4 and add the number rolled to one ability check of its choice. It can roll the die before or after making the ability check. The spell then ends."
    description_ru: "Вы касаетесь одного согласного существа. До окончания заклинания цель один раз может бросить 1к4 и прибавить выпавшее число к одной проверке характеристики по своему выбору. Она может бросить кость до или после совершения проверки. Заклинание после этого оканчивается."
