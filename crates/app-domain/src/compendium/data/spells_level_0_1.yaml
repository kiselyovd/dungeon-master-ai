    concentration: true
    classes: [bard, cleric]
    description_en: "Up to three creatures of your choice that you can see within range must make charisma saving throws. Whenever a target that fails this saving throw makes an attack roll or a saving throw before the spell ends, the target must roll a d4 and subtract the number rolled from the attack roll or saving throw."
    description_ru: "До трёх существ на ваш выбор, которых вы можете видеть в пределах дистанции, должны совершить спасброски Харизмы. Каждый раз, когда цель, провалившая этот спасбросок, совершает бросок атаки или спасбросок до окончания заклинания, она должна бросить 1к4 и вычесть выпавшее число из результата броска атаки или спасброска."
