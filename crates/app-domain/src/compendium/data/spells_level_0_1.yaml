      ru: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/identify/
    srd_section: "SRD 5.1 §Spells / Identify"
  - id: illusory-script
    name_en: "Illusory Script"
    name_ru: "Иллюзорный текст"
    level: 1
    school: illusion
    casting_time: "1 minute"
    range_ft: "Touch"
    components: { v: false, s: true, m: "A lead-based ink worth at least 10gp, which this spell consumes." }
    duration: "10 days"
    ritual: true
    concentration: false
    classes: [bard, warlock, wizard]
    description_en: "You write on parchment, paper, or some other suitable writing material and imbue it with a potent illusion that lasts for the duration. To you and any creatures you designate when you cast the spell, the writing appears normal, written in your hand, and conveys whatever meaning you intended when you wrote the text. To all others, the writing appears as if it were written in an unknown or magical script that is unintelligible. Alternatively, you can cause the writing to appear to be an entirely different message, written in a different hand and language, though the language must be one you know. Should the spell be dispelled, the original script and the illusion both disappear. A creature with truesight can read the hidden message."
    description_ru: "Вы пишете на пергаменте, бумаге или другом подходящем для письма материале и наполняете написанное мощной иллюзией, существующей на протяжении длительности заклинания. Для вас и любых выбранных вами при наложении заклинания существ написанное выглядит обычно, написано вашей рукой и передаёт тот смысл, что вы вкладывали при письме. Для всех остальных написанное выглядит так, будто оно написано на неизвестном или магическом письме, и нечитаемо. Также вы можете сделать так, чтобы написанное выглядело совершенно иным сообщением, написанным другим почерком и на другом языке, при условии, что этот язык вам известен. Если заклинание развеется, исчезнут и оригинальный текст, и иллюзия. Существо с истинным зрением может прочитать скрытое сообщение."
    at_higher_levels:
      en: null
      ru: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/illusory_script/
    srd_section: "SRD 5.1 §Spells / Illusory Script"
