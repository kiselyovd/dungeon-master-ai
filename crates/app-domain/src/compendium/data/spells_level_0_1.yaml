  - id: prestidigitation
    name_en: "Prestidigitation"
    name_ru: "Фокусы"
    level: 0
    school: transmutation
    casting_time: "1 action"
    range_ft: 10
    components: { v: true, s: true, m: null }
    duration: "1 hour"
    ritual: false
    concentration: false
    classes: [bard, sorcerer, warlock, wizard]
    description_en: "This spell is a minor magical trick that novice spellcasters use for practice. You create one of the following magical effects within 'range': - You create an instantaneous, harmless sensory effect, such as a shower of sparks, a puff of wind, faint musical notes, or an odd odor. - You instantaneously light or snuff out a candle, a torch, or a small campfire. - You instantaneously clean or soil an object no larger than 1 cubic foot. - You chill, warm, or flavor up to 1 cubic foot of nonliving material for 1 hour. - You make a color, a small mark, or a symbol appear on an object or a surface for 1 hour. - You create a nonmagical trinket or an illusory image that can fit in your hand and that lasts until the end of your next turn. If you cast this spell multiple times, you can have up to three of its non-instantaneous effects active at a time, and you can dismiss such an effect as an action."
    description_ru: "Это заклинание - небольшой магический трюк, который начинающие заклинатели используют для упражнения. Вы создаёте один из следующих магических эффектов в пределах дистанции: - Вы создаёте мгновенный безвредный сенсорный эффект, такой как сноп искр, порыв ветра, слабые музыкальные ноты или странный запах. - Вы мгновенно зажигаете или тушите свечу, факел или небольшой костёр. - Вы мгновенно чистите или пачкаете предмет объёмом не более 1 кубического фута. - Вы охлаждаете, согреваете или сдабриваете до 1 кубического фута неживой материи на 1 час. - Вы заставляете цвет, небольшой знак или символ появиться на предмете или поверхности на 1 час. - Вы создаёте немагический брелок или иллюзорный образ, который помещается в вашей руке и существует до конца вашего следующего хода. Если вы накладываете это заклинание несколько раз, у вас одновременно может быть до трёх его не мгновенных эффектов, и вы можете прекратить любой такой эффект действием."
