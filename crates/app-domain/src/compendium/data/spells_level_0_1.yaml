  - id: burning-hands
    name_en: "Burning Hands"
    name_ru: "Огненные ладони"
    level: 1
    school: evocation
    casting_time: "1 action"
    range_ft: "Self (15-foot cone)"
    components: { v: true, s: true, m: null }
    duration: "Instantaneous"
    ritual: false
    concentration: false
    classes: [cleric, sorcerer, warlock, wizard]
    description_en: "As you hold your hands with thumbs touching and fingers spread, a thin sheet of flames shoots forth from your outstretched fingertips. Each creature in a 15-foot cone must make a dexterity saving throw. A creature takes 3d6 fire damage on a failed save, or half as much damage on a successful one. The fire ignites any flammable objects in the area that aren't being worn or carried."
    description_ru: "Когда вы держите свои руки большими пальцами вместе с расставленными пальцами, из ваших вытянутых пальцев вырывается тонкая пелена пламени. Каждое существо в 15-футовом конусе должно совершить спасбросок Ловкости. Существо получает 3к6 урона огнём при провале или половину этого урона при успехе. Огонь поджигает все воспламеняемые предметы в области, которые не носятся и не находятся в чьих-либо руках."
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 2nd level or higher, the damage increases by 1d6 for each slot level above 1st."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 2-го уровня или выше, урон увеличивается на 1к6 за каждый уровень ячейки выше 1-го."
    damage:
      dice: "3d6"
      type: fire
    attack: null
    save:
      ability: dex
      half_on_success: true
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/burning_hands/
    srd_section: "SRD 5.1 §Spells / Burning Hands"
  - id: charm-person
    name_en: "Charm Person"
    name_ru: "Очарование личности"
    level: 1
    school: enchantment
    casting_time: "1 action"
    range_ft: 30
    components: { v: true, s: true, m: null }
    duration: "1 hour"
    ritual: false
    concentration: false
    classes: [bard, cleric, druid, sorcerer, warlock, wizard]
    description_en: "You attempt to charm a humanoid you can see within range. It must make a wisdom saving throw, and does so with advantage if you or your companions are fighting it. If it fails the saving throw, it is charmed by you until the spell ends or until you or your companions do anything harmful to it. The charmed creature regards you as a friendly acquaintance. When the spell ends, the creature knows it was charmed by you."
    description_ru: "Вы пытаетесь очаровать гуманоида, которого можете видеть в пределах дистанции. Цель должна совершить спасбросок Мудрости, причём с преимуществом, если вы или ваши спутники сражаетесь с ней. Если она провалит спасбросок, она будет очарована вами, пока заклинание не окончится или пока вы или ваши спутники не причините ей вред. Очарованное существо относится к вам как к дружественному знакомому. Когда заклинание оканчивается, существо понимает, что было вами очаровано."
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 2nd level or higher, you can target one additional creature for each slot level above 1st. The creatures must be within 30 feet of each other when you target them."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 2-го уровня или выше, вы можете подвергнуть его действию одно дополнительное существо за каждый уровень ячейки выше 1-го. Эти существа должны находиться в пределах 30 футов друг от друга, когда вы выбираете их целями."
    damage: null
    attack: null
    save:
      ability: wis
      half_on_success: false
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/charm_person/
    srd_section: "SRD 5.1 §Spells / Charm Person"
  - id: color-spray
    name_en: "Color Spray"
    name_ru: "Цветные брызги"
    level: 1
    school: illusion
    casting_time: "1 action"
    range_ft: "Self (15-foot cone)"
    components: { v: true, s: true, m: "A pinch of powder or sand that is colored red, yellow, and blue." }
    duration: "1 round"
    ritual: false
    concentration: false
    classes: [sorcerer, wizard]
    description_en: "A dazzling array of flashing, colored light springs from your hand. Roll 6d10; the total is how many hit points of creatures this spell can effect. Creatures in a 15-foot cone originating from you are affected in ascending order of their current hit points (ignoring unconscious creatures and creatures that can't see). Starting with the creature that has the lowest current hit points, each creature affected by this spell is blinded until the spell ends. Subtract each creature's hit points from the total before moving on to the creature with the next lowest hit points. A creature's hit points must be equal to or less than the remaining total for that creature to be affected."
    description_ru: "Ослепительная россыпь вспыхивающего разноцветного света бьёт из вашей ладони. Бросьте 6к10; полученная сумма - количество хитов существ, которое это заклинание может затронуть. Существа в 15-футовом конусе, исходящем от вас, попадают под действие в порядке возрастания их текущих хитов (бессознательные существа и существа, не способные видеть, игнорируются). Начиная с существа с наименьшим количеством хитов, каждое существо, затронутое этим заклинанием, ослеплено до окончания заклинания. Вычитайте хиты каждого существа из оставшейся суммы перед переходом к существу со следующим наименьшим количеством хитов. Чтобы существо было затронуто, его хиты должны быть равны или меньше оставшейся суммы."
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 2nd level or higher, roll an additional 2d10 for each slot level above 1st."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 2-го уровня или выше, бросьте дополнительно 2к10 за каждый уровень ячейки выше 1-го."
    damage: null
    attack: null
    save: null
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/color_spray/
    srd_section: "SRD 5.1 §Spells / Color Spray"
  - id: command
    name_en: "Command"
    name_ru: "Приказ"
    level: 1
    school: enchantment
    casting_time: "1 action"
    range_ft: 60
    components: { v: true, s: false, m: null }
    duration: "1 round"
    ritual: false
    concentration: false
    classes: [cleric, paladin, warlock]
    description_en: "You speak a one-word command to a creature you can see within range. The target must succeed on a wisdom saving throw or follow the command on its next turn. The spell has no effect if the target is undead, if it doesn't understand your language, or if your command is directly harmful to it. Some typical commands and their effects follow. You might issue a command other than one described here. If you do so, the DM determines how the target behaves. If the target can't follow your command, the spell ends **Approach.** The target moves toward you by the shortest and most direct route, ending its turn if it moves within 5 feet of you. **Drop** The target drops whatever it is holding and then ends its turn. **Flee.** The target spends its turn moving away from you by the fastest available means. **Grovel.** The target falls prone and then ends its turn. **Halt.** The target doesn't move and takes no actions. A flying creature stays aloft, provided that it is able to do so. If it must move to stay aloft, it flies the minimum distance needed to remain in the air."
    description_ru: "Вы произносите однословный приказ существу, которое можете видеть в пределах дистанции. Цель должна преуспеть в спасброске Мудрости, иначе будет вынуждена выполнять приказ в свой следующий ход. Заклинание не действует, если цель - нежить, если она не понимает ваш язык, или если ваш приказ прямо ей вредит. Ниже приведены несколько типичных приказов и их эффекты. Вы можете отдать и иной приказ, не описанный здесь. В этом случае Мастер определяет, как ведёт себя цель. Если цель не может выполнить ваш приказ, заклинание оканчивается. Подойди. Цель кратчайшим и прямейшим маршрутом перемещается к вам и оканчивает ход, оказавшись в пределах 5 футов от вас. Брось. Цель бросает то, что она держит, и затем оканчивает свой ход. Беги. Цель тратит свой ход на максимально быстрое удаление от вас. Пресмыкайся. Цель падает ничком и оканчивает свой ход. Стой. Цель не двигается и не совершает действий. Летающее существо остаётся в воздухе, если способно на это. Если оно должно двигаться, чтобы оставаться в воздухе, оно пролетает минимальное расстояние, необходимое для этого."
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 2nd level or higher, you can affect one additional creature for each slot level above 1st. The creatures must be within 30 feet of each other when you target them."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 2-го уровня или выше, вы можете подвергнуть его действию одно дополнительное существо за каждый уровень ячейки выше 1-го. Эти существа должны находиться в пределах 30 футов друг от друга, когда вы выбираете их целями."
    damage: null
    attack: null
    save:
      ability: wis
      half_on_success: false
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/command/
    srd_section: "SRD 5.1 §Spells / Command"
  - id: comprehend-languages
    name_en: "Comprehend Languages"
    name_ru: "Понимание языков"
    level: 1
    school: divination
    casting_time: "1 action"
    range_ft: "Self"
    components: { v: true, s: true, m: "A pinch of soot and salt." }
    duration: "1 hour"
    ritual: true
    concentration: false
    classes: [bard, sorcerer, warlock, wizard]
    description_en: "For the duration, you understand the literal meaning of any spoken language that you hear. You also understand any written language that you see, but you must be touching the surface on which the words are written. It takes about 1 minute to read one page of text. This spell doesn't decode secret messages in a text or a glyph, such as an arcane sigil, that isn't part of a written language."
    description_ru: "На время действия заклинания вы понимаете дословный смысл любого устного языка, который слышите. Вы также понимаете любой письменный язык, который видите, но при этом должны касаться поверхности, на которой написан текст. Прочтение одной страницы текста занимает примерно 1 минуту. Это заклинание не расшифровывает тайные сообщения в тексте или знак, такой как мистическая печать, не являющийся частью письменного языка."
    at_higher_levels:
      en: null
      ru: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/comprehend_languages/
    srd_section: "SRD 5.1 §Spells / Comprehend Languages"
  - id: create-or-destroy-water
    name_en: "Create or Destroy Water"
    name_ru: "Сотворение или уничтожение воды"
    level: 1
    school: transmutation
    casting_time: "1 action"
    range_ft: 30
    components: { v: true, s: true, m: "A drop of water if creating water, or a few grains of sand if destroying it." }
    duration: "Instantaneous"
    ritual: false
    concentration: false
    classes: [cleric, druid]
    description_en: "You either create or destroy water. **Create Water.** You create up to 10 gallons of clean water within range in an open container. Alternatively, the water falls as rain in a 30-foot cube within range **Destroy Water.** You destroy up to 10 gallons of water in an open container within range. Alternatively, you destroy fog in a 30-foot cube within range."
    description_ru: "Вы создаёте или уничтожаете воду. Сотворение воды. Вы создаёте до 10 галлонов чистой воды в пределах дистанции в открытом контейнере. Также вода может выпасть в виде дождя в кубе с длиной ребра 30 футов в пределах дистанции. Уничтожение воды. Вы уничтожаете до 10 галлонов воды в открытом контейнере в пределах дистанции. Также вы можете уничтожить туман в кубе с длиной ребра 30 футов в пределах дистанции."
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 2nd level or higher, you create or destroy 10 additional gallons of water, or the size of the cube increases by 5 feet, for each slot level above 1st."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 2-го уровня или выше, вы создаёте или уничтожаете дополнительно 10 галлонов воды, или размер куба увеличивается на 5 футов за каждый уровень ячейки выше 1-го."
    damage: null
    attack: null
    save: null
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/create_or_destroy_water/
    srd_section: "SRD 5.1 §Spells / Create or Destroy Water"
  - id: cure-wounds
    name_en: "Cure Wounds"
    name_ru: "Лечение ран"
    level: 1
    school: evocation
    casting_time: "1 action"
    range_ft: "Touch"
    components: { v: true, s: true, m: null }
    duration: "Instantaneous"
    ritual: false
    concentration: false
    classes: [bard, cleric, druid, paladin, ranger]
    description_en: "A creature you touch regains a number of hit points equal to 1d8 + your spellcasting ability modifier. This spell has no effect on undead or constructs."
    description_ru: "Существо, которого вы касаетесь, восстанавливает количество хитов, равное 1к8 + модификатор вашей характеристики заклинания. Это заклинание не оказывает действия на нежить и конструктов."
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 2nd level or higher, the healing increases by 1d8 for each slot level above 1st."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 2-го уровня или выше, восстанавливаемое количество хитов увеличивается на 1к8 за каждый уровень ячейки выше 1-го."
    damage: null
    attack: null
    save: null
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/cure_wounds/
    srd_section: "SRD 5.1 §Spells / Cure Wounds"
  - id: detect-evil-and-good
    name_en: "Detect Evil and Good"
    name_ru: "Обнаружение зла и добра"
    level: 1
    school: divination
    casting_time: "1 action"
    range_ft: "Self"
    components: { v: true, s: true, m: null }
    duration: "10 minutes"
    ritual: false
    concentration: true
    classes: [cleric, paladin]
    description_en: "For the duration, you know if there is an aberration, celestial, elemental, fey, fiend, or undead within 30 feet of you, as well as where the creature is located. Similarly, you know if there is a place or object within 30 feet of you that has been magically consecrated or desecrated. The spell can penetrate most barriers, but it is blocked by 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt."
    description_ru: "На время действия заклинания вы знаете, есть ли в пределах 30 футов от вас аберрация, небожитель, элементаль, фея, исчадие или нежить, а также где это существо находится. Также вы знаете, есть ли в пределах 30 футов от вас место или предмет, который был магически освящён или осквернён. Заклинание может проникать сквозь большинство барьеров, но блокируется 1 футом камня, 1 дюймом обычного металла, тонким листом свинца или 3 футами древесины или земли."
    at_higher_levels:
      en: null
      ru: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/detect_evil_and_good/
    srd_section: "SRD 5.1 §Spells / Detect Evil and Good"
  - id: detect-magic
    name_en: "Detect Magic"
    name_ru: "Обнаружение магии"
    level: 1
    school: divination
    casting_time: "1 action"
    range_ft: "Self"
    components: { v: true, s: true, m: null }
    duration: "10 minutes"
    ritual: true
    concentration: true
    classes: [bard, cleric, druid, paladin, ranger, sorcerer, wizard]
    description_en: "For the duration, you sense the presence of magic within 30 feet of you. If you sense magic in this way, you can use your action to see a faint aura around any visible creature or object in the area that bears magic, and you learn its school of magic, if any. The spell can penetrate most barriers, but it is blocked by 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt."
    description_ru: "На время действия заклинания вы ощущаете присутствие магии в пределах 30 футов от вас. Если вы ощутили таким образом магию, вы можете действием увидеть слабую ауру вокруг видимого существа или предмета в области, которые несут магию, и узнаёте школу магии, если она есть. Заклинание может проникать сквозь большинство барьеров, но блокируется 1 футом камня, 1 дюймом обычного металла, тонким листом свинца или 3 футами древесины или земли."
    at_higher_levels:
      en: null
      ru: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/detect_magic/
    srd_section: "SRD 5.1 §Spells / Detect Magic"
  - id: detect-poison-and-disease
    name_en: "Detect Poison and Disease"
    name_ru: "Обнаружение яда и болезни"
    level: 1
    school: divination
    casting_time: "1 action"
    range_ft: "Self"
    components: { v: true, s: true, m: "A yew leaf." }
    duration: "10 minutes"
    ritual: true
    concentration: true
    classes: [cleric, druid, paladin, ranger]
    description_en: "For the duration, you can sense the presence and location of poisons, poisonous creatures, and diseases within 30 feet of you. You also identify the kind of poison, poisonous creature, or disease in each case. The spell can penetrate most barriers, but it is blocked by 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt."
    description_ru: "На время действия заклинания вы можете ощущать присутствие и местоположение ядов, ядовитых существ и болезней в пределах 30 футов от вас. Вы также определяете вид яда, ядовитого существа или болезни в каждом случае. Заклинание может проникать сквозь большинство барьеров, но блокируется 1 футом камня, 1 дюймом обычного металла, тонким листом свинца или 3 футами древесины или земли."
