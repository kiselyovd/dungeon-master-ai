  - id: animal-friendship
    name_en: "Animal Friendship"
    name_ru: "Дружба с животными"
    level: 1
    school: enchantment
    casting_time: "1 action"
    range_ft: 30
    components: { v: true, s: true, m: "A morsel of food." }
    duration: "24 hours"
    ritual: false
    concentration: false
    classes: [bard, druid, ranger]
    description_en: "This spell lets you convince a beast that you mean it no harm. Choose a beast that you can see within range. It must see and hear you. If the beast's Intelligence is 4 or higher, the spell fails. Otherwise, the beast must succeed on a Wisdom saving throw or be charmed by you for the spell's duration. If you or one of your companions harms the target, the spells ends."
    description_ru: "Это заклинание позволяет вам убедить зверя в том, что вы не желаете ему вреда. Выберите зверя, которого вы можете видеть в пределах дистанции. Он должен видеть и слышать вас. Если у зверя Интеллект 4 или больше, заклинание не работает. В противном случае зверь должен преуспеть в спасброске Мудрости, иначе становится очарованным вами на время действия заклинания. Если вы или ваши спутники причиняют цели вред, заклинание оканчивается."
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 2nd level or higher, you can affect one additional beast for each slot level above 1st."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 2-го уровня или выше, вы можете подвергнуть его действию одного дополнительного зверя за каждый уровень ячейки выше 1-го."
    damage: null
    attack: null
    save:
      ability: int
      half_on_success: false
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/animal_friendship/
    srd_section: "SRD 5.1 §Spells / Animal Friendship"
  - id: bane
    name_en: "Bane"
    name_ru: "Проклятье"
    level: 1
    school: enchantment
