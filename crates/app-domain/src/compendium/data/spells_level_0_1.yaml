  - id: chill-touch
    name_en: "Chill Touch"
    name_ru: "Холодное прикосновение"
    level: 0
    school: necromancy
    casting_time: "1 action"
    range_ft: 120
    components: { v: true, s: true, m: null }
    duration: "1 round"
    ritual: false
    concentration: false
    classes: [sorcerer, warlock, wizard]
    description_en: "You create a ghostly, skeletal hand in the space of a creature within range. Make a ranged spell attack against the creature to assail it with the chill of the grave. On a hit, the target takes 1d8 necrotic damage, and it can't regain hit points until the start of your next turn. Until then, the hand clings to the target. If you hit an undead target, it also has disadvantage on attack rolls against you until the end of your next turn."
    description_ru: "Вы создаёте призрачную, скелетообразную руку в пространстве существа в пределах дистанции. Совершите дальнобойную атаку заклинанием по этому существу, чтобы поразить его холодом могилы. При попадании цель получает 1к8 урона некротической энергией и не может восстанавливать хиты до начала вашего следующего хода. До этого момента рука цепляется за цель. Если вы попали по нежити, она также совершает с помехой броски атаки против вас до конца вашего следующего хода."
    at_higher_levels:
      en: "This spell's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8)."
      ru: "Урон этого заклинания увеличивается на 1к8, когда вы достигаете 5-го уровня (2к8), 11-го уровня (3к8) и 17-го уровня (4к8)."
    damage:
      dice: "1d8"
      type: necrotic
    attack:
      kind: ranged_spell
    save: null
    scales_with_level: cantrip-scaling
    source_url: https://5thsrd.org/spellcasting/spells/chill_touch/
    srd_section: "SRD 5.1 §Spells / Chill Touch"
  - id: dancing-lights
    name_en: "Dancing Lights"
    name_ru: "Пляшущие огоньки"
    level: 0
    school: evocation
    casting_time: "1 action"
    range_ft: 120
    components: { v: true, s: true, m: "A bit of phosphorus or wychwood, or a glowworm." }
    duration: "1 minute"
    ritual: false
    concentration: true
    classes: [bard, sorcerer, wizard]
    description_en: "You create up to four torch-sized lights within range, making them appear as torches, lanterns, or glowing orbs that hover in the air for the duration. You can also combine the four lights into one glowing vaguely humanoid form of Medium size. Whichever form you choose, each light sheds dim light in a 10-foot radius. As a bonus action on your turn, you can move the lights up to 60 feet to a new spot within range. A light must be within 20 feet of another light created by this spell, and a light winks out if it exceeds the spell's range."
    description_ru: "Вы создаёте до четырёх огоньков размером с факел в пределах дистанции, и они выглядят как факелы, фонари или светящиеся шары, парящие в воздухе на протяжении длительности заклинания. Вы также можете объединить эти четыре огонька в одну светящуюся смутно гуманоидную форму Среднего размера. Какую бы форму вы ни выбрали, каждый огонёк испускает тусклый свет в радиусе 10 футов. Бонусным действием в свой ход вы можете переместить огоньки на расстояние до 60 футов в новое место в пределах дистанции. Огонёк должен находиться в пределах 20 футов от другого огонька, созданного этим заклинанием, и гаснет, если оказывается за пределами дистанции заклинания."
    at_higher_levels:
      en: null
      ru: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/dancing_lights/
    srd_section: "SRD 5.1 §Spells / Dancing Lights"
  - id: druidcraft
    name_en: "Druidcraft"
    name_ru: "Друидизм"
    level: 0
    school: transmutation
    casting_time: "1 action"
    range_ft: 30
    components: { v: true, s: true, m: null }
    duration: "Instantaneous"
    ritual: false
    concentration: false
    classes: [druid]
    description_en: "Whispering to the spirits of nature, you create one of the following effects within range: - You create a tiny, harmless sensory effect that predicts what the weather will be at your location for the next 24 hours. The effect might manifest as a golden orb for clear skies, a cloud for rain, falling snowflakes for snow, and so on. This effect persists for 1 round. - You instantly make a flower blossom, a seed pod open, or a leaf bud bloom. - You create an instantaneous, harmless sensory effect, such as falling leaves, a puff of wind, the sound of a small animal, or the faint odor of skunk. The effect must fit in a 5---foot cube. - You instantly light or snuff out a candle, a torch, or a small campfire."
    description_ru: "Шепча духам природы, вы создаёте один из следующих эффектов в пределах дистанции: - Вы создаёте крошечный безвредный сенсорный эффект, предсказывающий, какая будет погода в вашей местности в течение следующих 24 часов. Эффект может проявиться как золотистый шар для ясной погоды, облако для дождя, падающие снежинки для снега и так далее. Эффект сохраняется 1 раунд. - Вы мгновенно заставляете цветок распуститься, семенной стручок раскрыться или лиственную почку расцвести. - Вы создаёте мгновенный безвредный сенсорный эффект, такой как падающие листья, порыв ветра, звук мелкого животного или слабый запах скунса. Эффект должен помещаться в куб с длиной ребра 5 футов. - Вы мгновенно зажигаете или тушите свечу, факел или небольшой костёр."
    at_higher_levels:
      en: null
      ru: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/druidcraft/
    srd_section: "SRD 5.1 §Spells / Druidcraft"
  - id: eldritch-blast
    name_en: "Eldritch Blast"
    name_ru: "Мистический заряд"
    level: 0
    school: evocation
    casting_time: "1 action"
    range_ft: 120
    components: { v: true, s: true, m: null }
    duration: "Instantaneous"
    ritual: false
    concentration: false
    classes: [warlock]
    description_en: "A beam of crackling energy streaks toward a creature within range. Make a ranged spell attack against the target. On a hit, the target takes 1d10 force damage. The spell creates more than one beam when you reach higher levels: two beams at 5th level, three beams at 11th level, and four beams at 17th level. You can direct the beams at the same target or at different ones. Make a separate attack roll for each beam."
    description_ru: "Луч потрескивающей энергии устремляется к существу в пределах дистанции. Совершите дальнобойную атаку заклинанием по цели. При попадании цель получает 1к10 урона силовым полем. На больших уровнях это заклинание создаёт больше одного луча: два луча на 5-м уровне, три луча на 11-м уровне и четыре луча на 17-м уровне. Вы можете направить лучи в одну цель или в разные. Для каждого луча совершите отдельный бросок атаки."
    at_higher_levels:
      en: null
      ru: null
    damage:
      dice: "1d10"
      type: force
    attack:
      kind: ranged_spell
    save: null
    scales_with_level: cantrip-scaling
    source_url: https://5thsrd.org/spellcasting/spells/eldritch_blast/
    srd_section: "SRD 5.1 §Spells / Eldritch Blast"
  - id: fire-bolt
    name_en: "Fire Bolt"
    name_ru: "Огненный снаряд"
    level: 0
    school: evocation
    casting_time: "1 action"
    range_ft: 120
    components: { v: true, s: true, m: null }
    duration: "Instantaneous"
    ritual: false
    concentration: false
    classes: [sorcerer, wizard]
    description_en: "You hurl a mote of fire at a creature or object within range. Make a ranged spell attack against the target. On a hit, the target takes 1d10 fire damage. A flammable object hit by this spell ignites if it isn't being worn or carried."
    description_ru: "Вы швыряете комок огня в существо или предмет в пределах дистанции. Совершите дальнобойную атаку заклинанием по цели. При попадании цель получает 1к10 урона огнём. Воспламеняемый предмет, по которому попало это заклинание, загорается, если он не носится и не находится в чьих-либо руках."
    at_higher_levels:
