    duration: "1 minute"
    ritual: false
    concentration: false
    classes: [wizard]
    description_en: "Slick grease covers the ground in a 10-foot square centered on a point within range and turns it into difficult terrain for the duration. When the grease appears, each creature standing in its area must succeed on a dexterity saving throw or fall prone. A creature that enters the area or ends its turn there must also succeed on a dexterity saving throw or fall prone."
    description_ru: "Скользкий жир покрывает землю в квадрате со стороной 10 футов с центром в точке в пределах дистанции и превращает её в труднопроходимую местность на время действия заклинания. Когда жир появляется, каждое существо, стоящее в его области, должно преуспеть в спасброске Ловкости, иначе упадёт ничком. Существо, входящее в эту область или оканчивающее в ней свой ход, тоже должно преуспеть в спасброске Ловкости, иначе упадёт ничком."
