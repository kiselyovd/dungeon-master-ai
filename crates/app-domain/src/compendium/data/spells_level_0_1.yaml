    components: { v: true, s: false, m: null }
    duration: "1 minute"
    ritual: false
    concentration: true
    classes: [bard, cleric, druid, warlock]
    description_en: "Each object in a 20-foot cube within range is outlined in blue, green, or violet light (your choice). Any creature in the area when the spell is cast is also outlined in light if it fails a dexterity saving throw. For the duration, objects and affected creatures shed dim light in a 10-foot radius. Any attack roll against an affected creature or object has advantage if the attacker can see it, and the affected creature or object can't benefit from being invisible."
    description_ru: "Каждый предмет в кубе с длиной ребра 20 футов в пределах дистанции очерчен синим, зелёным или фиолетовым светом (на ваш выбор). Любое существо в этой области в момент наложения заклинания также очерчивается светом, если провалит спасбросок Ловкости. На время действия заклинания объекты и затронутые существа испускают тусклый свет в радиусе 10 футов. Все броски атаки по затронутым существам или предметам совершаются с преимуществом, если атакующий может их видеть, и эти существа или предметы не получают преимуществ от невидимости."
