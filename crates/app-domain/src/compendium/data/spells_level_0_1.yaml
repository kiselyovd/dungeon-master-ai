  - id: silent-image
    name_en: "Silent Image"
    name_ru: "Безмолвный образ"
    level: 1
    school: illusion
    casting_time: "1 action"
    range_ft: 60
    components: { v: true, s: true, m: "A bit of fleece." }
    duration: "10 minutes"
    ritual: false
    concentration: true
    classes: [bard, sorcerer, wizard]
    description_en: "You create the image of an object, a creature, or some other visible phenomenon that is no larger than a 15-foot cube. The image appears at a spot within range and lasts for the duration. The image is purely visual; it isn't accompanied by sound, smell, or other sensory effects. You can use your action to cause the image to move to any spot within range. As the image changes location, you can alter its appearance so that its movements appear natural for the image. For example, if you create an image of a creature and move it, you can alter the image so that it appears to be walking. Physical interaction with the image reveals it to be an illusion, because things can pass through it. A creature that uses its action to examine the image can determine that it is an illusion with a successful Intelligence (Investigation) check against your spell save DC. If a creature discerns the illusion for what it is, the creature can see through the image."
    description_ru: "Вы создаёте образ предмета, существа или иного видимого явления, не превышающего куб с длиной ребра 15 футов. Образ появляется в точке в пределах дистанции и существует на протяжении длительности заклинания. Образ полностью визуальный; он не сопровождается звуками, запахами или другими сенсорными эффектами. Вы можете действием перемещать образ в любую точку в пределах дистанции. По мере перемещения образа вы можете изменять его внешний вид так, чтобы движения выглядели естественно для этого образа. Например, если вы создадите образ существа и переместите его, вы сможете изменить образ так, чтобы он выглядел идущим. Физическое взаимодействие с образом выявляет, что это иллюзия, поскольку сквозь него можно проходить. Существо, использующее своё действие, чтобы изучить образ, может определить, что это иллюзия, успешно совершив проверку Интеллекта (Расследование) против Сл вашего спасброска заклинания. Если существо распознало иллюзию как таковую, оно сможет видеть сквозь образ."
