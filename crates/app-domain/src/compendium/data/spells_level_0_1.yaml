  - id: disguise-self
    name_en: "Disguise Self"
    name_ru: "Маскировка"
    level: 1
    school: illusion
    casting_time: "1 action"
    range_ft: "Self"
    components: { v: true, s: true, m: null }
    duration: "1 hour"
    ritual: false
    concentration: false
    classes: [bard, cleric, sorcerer, wizard]
    description_en: "You make yourself - including your clothing, armor, weapons, and other belongings on your person - look different until the spell ends or until you use your action to dismiss it. You can seem 1 foot shorter or taller and can appear thin, fat, or in between. You can't change your body type, so you must adopt a form that has the same basic arrangement of limbs. Otherwise, the extent of the illusion is up to you. The changes wrought by this spell fail to hold up to physical inspection. For example, if you use this spell to add a hat to your outfit, objects pass through the hat, and anyone who touches it would feel nothing or would feel your head and hair. If you use this spell to appear thinner than you are, the hand of someone who reaches out to touch you would bump into you while it was seemingly still in midair. To discern that you are disguised, a creature can use its action to inspect your apperance and must succeed on an Intelligence (Investigation) check against your spell save DC."
    description_ru: "Вы изменяете свой облик - включая одежду, доспехи, оружие и прочие носимые на себе предметы - пока заклинание не окончится или пока вы не прекратите его действием. Вы можете показаться на 1 фут ниже или выше и можете выглядеть стройным, толстым или обычным. Вы не можете изменить тип своего тела, поэтому должны принимать форму с тем же базовым строением конечностей. В остальном степень иллюзии - на ваше усмотрение. Изменения, создаваемые этим заклинанием, не выдерживают физической проверки. Например, если вы используете это заклинание, чтобы добавить шляпу к своему наряду, предметы проходят сквозь шляпу, и тот, кто прикоснулся бы к ней, ничего не почувствовал бы или коснулся бы вашей головы и волос. Если вы используете это заклинание, чтобы казаться стройнее, чем вы есть, рука кого-то, кто протянулся бы коснуться вас, наткнулась бы на вас, пока всё ещё, казалось бы, оставаясь в воздухе. Чтобы понять, что вы замаскированы, существо может действием изучить ваш облик и должно преуспеть в проверке Интеллекта (Расследование) против Сл вашего спасброска заклинания."
