      en: null
      ru: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/speak_with_animals/
    srd_section: "SRD 5.1 §Spells / Speak with Animals"
  - id: thunderwave
    name_en: "Thunderwave"
    name_ru: "Громовая волна"
    level: 1
    school: evocation
    casting_time: "1 action"
    range_ft: "Self (15-foot cube)"
    components: { v: true, s: true, m: null }
    duration: "Instantaneous"
    ritual: false
    concentration: false
    classes: [bard, cleric, druid, sorcerer, wizard]
    description_en: "A wave of thunderous force sweeps out from you. Each creature in a 15-foot cube originating from you must make a constitution saving throw. On a failed save, a creature takes 2d8 thunder damage and is pushed 10 feet away from you. On a successful save, the creature takes half as much damage and isn't pushed. In addition, unsecured objects that are completely within the area of effect are automatically pushed 10 feet away from you by the spell's effect, and the spell emits a thunderous boom audible out to 300 feet."
    description_ru: "Волна громовой силы исходит от вас. Каждое существо в кубе с длиной ребра 15 футов, исходящем от вас, должно совершить спасбросок Телосложения. При провале существо получает 2к8 урона звуком и отталкивается на 10 футов от вас. При успехе существо получает половину этого урона и не отталкивается. Кроме того, незакреплённые предметы, полностью находящиеся в области действия, автоматически отталкиваются на 10 футов от вас эффектом заклинания, и заклинание издаёт громовой раскат, слышимый на расстоянии до 300 футов."
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 2nd level or higher, the damage increases by 1d8 for each slot level above 1st."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 2-го уровня или выше, урон увеличивается на 1к8 за каждый уровень ячейки выше 1-го."
    damage:
      dice: "2d8"
      type: thunder
    attack: null
    save:
      ability: con
      half_on_success: true
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/thunderwave/
    srd_section: "SRD 5.1 §Spells / Thunderwave"
  - id: unseen-servant
    name_en: "Unseen Servant"
    name_ru: "Невидимый слуга"
    level: 1
    school: conjuration
    casting_time: "1 action"
    range_ft: 60
    components: { v: true, s: true, m: "A piece of string and a bit of wood." }
    duration: "1 hour"
    ritual: true
    concentration: false
    classes: [bard, warlock, wizard]
    description_en: "This spell creates an invisible, mindless, shapeless force that performs simple tasks at your command until the spell ends. The servant springs into existence in an unoccupied space on the ground within range. It has AC 10, 1 hit point, and a Strength of 2, and it can't attack. If it drops to 0 hit points, the spell ends. Once on each of your turns as a bonus action, you can mentally command the servant to move up to 15 feet and interact with an object. The servant can perform simple tasks that a human servant could do, such as fetching things, cleaning, mending, folding clothes, lighting fires, serving food, and pouring wind. Once you give the command, the servant performs the task to the best of its ability until it completes the task, then waits for your next command. If you command the servant to perform a task that would move it more than 60 feet away from you, the spell ends."
    description_ru: "Это заклинание создаёт невидимую, бездумную, бесформенную силу, выполняющую простые поручения по вашей команде, пока заклинание не окончится. Слуга появляется в свободном пространстве на земле в пределах дистанции. У него КД 10, 1 хит и Сила 2, и он не может атаковать. Если его хиты опускаются до 0, заклинание оканчивается. Раз в свой ход бонусным действием вы можете мысленно приказать слуге переместиться на расстояние до 15 футов и взаимодействовать с предметом. Слуга может выполнять простые задачи, которые мог бы выполнить человеческий слуга, такие как приносить вещи, прибираться, чинить, складывать одежду, разжигать огонь, подавать еду и наливать вино. Получив команду, слуга выполняет задачу в меру своих сил до её завершения, а затем ожидает вашей следующей команды. Если вы прикажете слуге выполнить задачу, которая потребует от него удалиться от вас более чем на 60 футов, заклинание оканчивается."
    at_higher_levels:
      en: null
      ru: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/unseen_servant/
    srd_section: "SRD 5.1 §Spells / Unseen Servant"
