  - id: produce-flame
    name_en: "Produce Flame"
    name_ru: "Сотворение пламени"
    level: 0
    school: conjuration
    casting_time: "1 action"
    range_ft: "Self"
    components: { v: true, s: true, m: null }
    duration: "10 minutes"
    ritual: false
    concentration: false
    classes: [druid]
    description_en: "A flickering flame appears in your hand. The flame remains there for the duration and harms neither you nor your equipment. The flame sheds bright light in a 10-foot radius and dim light for an additional 10 feet. The spell ends if you dismiss it as an action or if you cast it again. You can also attack with the flame, although doing so ends the spell. When you cast this spell, or as an action on a later turn, you can hurl the flame at a creature within 30 feet of you. Make a ranged spell attack. On a hit, the target takes 1d8 fire damage."
    description_ru: "В вашей руке появляется мерцающее пламя. Это пламя сохраняется на протяжении длительности заклинания и не причиняет вреда ни вам, ни вашему снаряжению. Пламя испускает яркий свет в радиусе 10 футов и тусклый свет ещё на 10 футов. Заклинание оканчивается, если вы прекращаете его действием или накладываете снова. Вы также можете атаковать пламенем, но это завершит заклинание. Накладывая это заклинание, или действием в последующий ход, вы можете метнуть пламя в существо в пределах 30 футов от вас. Совершите дальнобойную атаку заклинанием. При попадании цель получает 1к8 урона огнём."
    at_higher_levels:
      en: "This spell's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8)."
      ru: "Урон этого заклинания увеличивается на 1к8, когда вы достигаете 5-го уровня (2к8), 11-го уровня (3к8) и 17-го уровня (4к8)."
