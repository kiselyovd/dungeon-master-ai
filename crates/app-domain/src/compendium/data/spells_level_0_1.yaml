  - id: entangle
    name_en: "Entangle"
    name_ru: "Опутывание"
    level: 1
    school: conjuration
    casting_time: "1 action"
    range_ft: 90
    components: { v: true, s: true, m: null }
    duration: "1 minute"
    ritual: false
    concentration: true
    classes: [druid]
    description_en: "Grasping weeds and vines sprout from the ground in a 20-foot square starting form a point within range. For the duration, these plants turn the ground in the area into difficult terrain. A creature in the area when you cast the spell must succeed on a strength saving throw or be restrained by the entangling plants until the spell ends. A creature restrained by the plants can use its action to make a Strength check against your spell save DC. On a success, it frees itself. When the spell ends, the conjured plants wilt away."
    description_ru: "Цепкие сорняки и лианы прорастают из земли в области 20 футов на 20 футов, исходящей из точки в пределах дистанции. На время действия заклинания эти растения превращают землю в этой области в труднопроходимую местность. Существо в этой области в момент наложения заклинания должно преуспеть в спасброске Силы, иначе будет схвачено опутывающими растениями до окончания заклинания. Существо, схваченное растениями, может действием совершить проверку Силы против Сл вашего спасброска заклинания. При успехе оно освобождается. Когда заклинание оканчивается, призванные растения вянут."
