  - id: light
    name_en: "Light"
    name_ru: "Свет"
    level: 0
    school: evocation
    casting_time: "1 action"
    range_ft: "Touch"
    components: { v: true, s: false, m: "A firefly or phosphorescent moss." }
    duration: "1 hour"
    ritual: false
    concentration: false
    classes: [bard, cleric, sorcerer, wizard]
    description_en: "You touch one object that is no larger than 10 feet in any dimension. Until the spell ends, the object sheds bright light in a 20-foot radius and dim light for an additional 20 feet. The light can be colored as you like. Completely covering the object with something opaque blocks the light. The spell ends if you cast it again or dismiss it as an action. If you target an object held or worn by a hostile creature, that creature must succeed on a dexterity saving throw to avoid the spell."
    description_ru: "Вы касаетесь одного предмета, размер которого по всем сторонам не превышает 10 футов. Пока заклинание активно, предмет испускает яркий свет в радиусе 20 футов и тусклый свет ещё на 20 футов. Свет может быть любого выбранного вами цвета. Полное укрытие предмета чем-то непрозрачным блокирует свет. Заклинание оканчивается, если вы накладываете его снова или прекращаете действием. Если вы выбрали целью предмет, носимый или несомый враждебным существом, это существо должно преуспеть в спасброске Ловкости, чтобы избежать заклинания."
