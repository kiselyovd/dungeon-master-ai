    description_en: "Lightning springs from your hand to deliver a shock to a creature you try to touch. Make a melee spell attack against the target. You have advantage on the attack roll if the target is wearing armor made of metal. On a hit, the target takes 1d8 lightning damage, and it can't take reactions until the start of its next turn."
    description_ru: "Молния срывается с вашей руки, чтобы поразить существо, которого вы пытаетесь коснуться. Совершите рукопашную атаку заклинанием по цели. Вы совершаете бросок атаки с преимуществом, если цель носит доспех из металла. При попадании цель получает 1к8 урона электричеством и не может совершать реакции до начала своего следующего хода."
