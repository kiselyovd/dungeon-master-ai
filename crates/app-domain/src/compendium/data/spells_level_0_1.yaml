  - id: goodberry
    name_en: "Goodberry"
    name_ru: "Ягоды"
    level: 1
    school: transmutation
    casting_time: "1 action"
    range_ft: "Touch"
    components: { v: true, s: true, m: "A sprig of mistletoe." }
    duration: "Instantaneous"
    ritual: false
    concentration: false
    classes: [druid, ranger]
    description_en: "Up to ten berries appear in your hand and are infused with magic for the duration. A creature can use its action to eat one berry. Eating a berry restores 1 hit point, and the berry provides enough nourishment to sustain a creature for one day. The berries lose their potency if they have not been consumed within 24 hours of the casting of this spell."
    description_ru: "В вашей руке появляется до десяти ягод, наполненных магией на время действия заклинания. Существо может действием съесть одну ягоду. Поедание ягоды восстанавливает 1 хит, и одна ягода обеспечивает существу пропитание на один день. Ягоды теряют свою силу, если их не съели в течение 24 часов после наложения заклинания."
