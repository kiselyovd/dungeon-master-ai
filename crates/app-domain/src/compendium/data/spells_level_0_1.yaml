    description_ru: "Вы выплёскиваете в существо, которое можете видеть в пределах дистанции, поток оскорблений, наполненных тонкими чарами. Если цель может вас слышать (понимать вас ей не обязательно), она должна преуспеть в спасброске Мудрости, иначе получит 1к4 урона психической энергией и совершит с помехой свой следующий бросок атаки, совершаемый до конца её следующего хода."
