  - id: magnifying-glass
    name_en: Magnifying Glass
    name_ru: Увеличительное стекло
    cost: { gp: 100 }
    weight_lb: 0
    is_bundle: false
    contents: null
    description_en: "This lens allows a closer look at small objects. It is also useful as a substitute for flint and steel when starting fires. Lighting a fire with a magnifying glass requires light as bright as sunlight to focus, tinder to ignite, and about 5 minutes for the fire to ignite. A magnifying glass grants advantage on any ability check made to appraise or inspect an item that is small or highly detailed."
    description_ru: "Эта линза позволяет внимательнее рассматривать маленькие объекты. Также её можно использовать как замену кремню и кресалу для разведения огня. Разжигание огня увеличительным стеклом требует света яркостью солнечного для фокусировки, трута для воспламенения и около 5 минут для возгорания. Увеличительное стекло даёт преимущество на любые проверки характеристик для оценки или осмотра маленьких или детализированных предметов."
    source_url: https://5thsrd.org/character/equipment/
    srd_section: "SRD 5.1 §Adventuring Gear / Magnifying Glass"

  - id: manacles
    name_en: Manacles
    name_ru: Кандалы
    cost: { gp: 2 }
    weight_lb: 6
    is_bundle: false
    contents: null
    description_en: "These metal restraints can bind a Small or Medium creature. Escaping the manacles requires a successful DC 20 Dexterity check. Breaking them requires a successful DC 20 Strength check. Each set of manacles comes with one key. Without the key, a creature proficient with thieves' tools can pick the manacles' lock with a successful DC 15 Dexterity check. Manacles have 15 hit points."
    description_ru: "Эти металлические оковы могут сковывать Маленькое или Среднее существо. Освобождение от кандалов требует успешной проверки Ловкости со Сл 20. Их можно разорвать успешной проверкой Силы со Сл 20. К каждому набору кандалов прилагается один ключ. Без ключа существо, владеющее воровскими инструментами, может взломать замок кандалов успешной проверкой Ловкости со Сл 15. Кандалы имеют 15 хитов."
