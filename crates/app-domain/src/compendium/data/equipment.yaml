    description_ru: "Друидической фокусировкой может быть веточка омелы или остролиста, жезл или скипетр из тиса или другого особого дерева, посох, вырезанный целиком из живого дерева, или предмет-тотем с перьями, мехом, костями и зубами священных животных. Друид может использовать такой предмет как фокусировку."
