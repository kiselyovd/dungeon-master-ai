    is_bundle: false
    contents: null
    description_en: "This kit is a leather pouch containing bandages, salves, and splints. The kit has ten uses. As an action, you can expend one use of the kit to stabilize a creature that has 0 hit points, without needing to make a Wisdom (Medicine) check."
    description_ru: "Этот набор представляет собой кожаный мешочек с бинтами, мазями и шинами. У набора есть десять зарядов. Действием вы можете потратить один заряд набора, чтобы стабилизировать существо с 0 хитов без необходимости совершать проверку Мудрости (Медицина)."
    source_url: https://5thsrd.org/character/equipment/
    srd_section: "SRD 5.1 §Adventuring Gear / Healer's Kit"

  - id: herbalism-kit
    name_en: Herbalism Kit
    name_ru: Набор травника
    cost: { gp: 5 }
    weight_lb: 3
    is_bundle: false
    contents: null
    description_en: "This kit contains a variety of instruments such as clippers, mortar and pestle, and pouches and vials used by herbalists to create remedies and potions. Proficiency with this kit lets you add your proficiency bonus to any ability checks you make to identify or apply herbs. Also, proficiency with this kit is required to create antitoxin and potions of healing."
    description_ru: "Этот набор содержит разнообразные инструменты, такие как ножницы, ступка и пестик, мешочки и флаконы, используемые травниками для создания лекарств и зелий. Владение этим набором позволяет добавлять бонус мастерства к любым проверкам характеристик, совершаемым для определения или применения трав. Кроме того, владение этим набором требуется для создания антитоксина и зелий лечения."
    source_url: https://5thsrd.org/character/equipment/
    srd_section: "SRD 5.1 §Tools / Herbalism Kit"

  - id: holy-water-flask
    name_en: Holy Water (flask)
    name_ru: Святая вода (склянка)
    cost: { gp: 25 }
    weight_lb: 1
    is_bundle: false
    contents: null
    description_en: "As an action, you can splash the contents of this flask onto a creature within 5 feet of you or throw it up to 20 feet, shattering it on impact. In either case, make a ranged attack against a target creature, treating the holy water as an improvised weapon. If the target is a fiend or undead, it takes 2d6 radiant damage. A cleric or paladin may create holy water by performing a special ritual. The ritual takes 1 hour to perform, uses 25 gp worth of powdered silver, and requires the caster to expend a 1st-level spell slot."
    description_ru: "Действием вы можете выплеснуть содержимое этой склянки на существо в пределах 5 футов или бросить её на расстояние до 20 футов, разбив при ударе. В любом случае совершите дальнобойную атаку по существу-цели, считая святую воду импровизированным оружием. Если цель - исчадие или нежить, она получает 2d6 урона излучением. Жрец или паладин может создавать святую воду, проведя особый ритуал. Ритуал занимает 1 час, использует серебряную пыль на сумму 25 зм и требует от заклинателя потратить ячейку заклинания 1-го круга."
    source_url: https://5thsrd.org/character/equipment/
    srd_section: "SRD 5.1 §Adventuring Gear / Holy Water"

