  - id: net
    name_en: Net
    name_ru: Сеть
    category: martial_ranged
    cost: { gp: 1 }
    damage: { dice: "0", type: bludgeoning, versatile_dice: null }
    weight_lb: 3
    properties: [special, thrown]
    range_ft: { normal: 5, long: 15 }
    special_rules:
      en: "A Large or smaller creature hit by a net is restrained until it is freed. A net has no effect on creatures that are formless, or creatures that are Huge or larger. A creature can use its action to make a DC 10 Strength check, freeing itself or another creature within its reach on a success. Dealing 5 slashing damage to the net (AC 10) also frees the creature without harming it, ending the effect and destroying the net. When you use an action, bonus action, or reaction to attack with a net, you can make only one attack regardless of the number of attacks you can normally make."
      ru: "Существо размера не больше Большого, попавшее под сеть, считается опутанным, пока его не освободят. Сеть не действует на бесформенных существ и существ размера Огромное и больше. Существо может действием совершить проверку Силы со Сл 10, освободив себя или другое существо в пределах своей досягаемости при успехе. Нанесение сети 5 рубящего урона (КД 10) также освобождает существо, не причиняя ему вреда, оканчивая эффект и уничтожая сеть. Когда вы используете действие, бонусное действие или реакцию для атаки сетью, вы можете совершить только одну атаку, независимо от числа атак, которые обычно можете совершить."
    source_url: https://5thsrd.org/character/weapons/
    srd_section: "SRD 5.1 §Weapons / Net"

