    srd_section: "SRD 5.1 §Adventuring Gear / Tent, two-person"

  - id: thieves-tools
    name_en: Thieves' Tools
    name_ru: Воровские инструменты
    cost: { gp: 25 }
    weight_lb: 1
    is_bundle: false
    contents: null
    description_en: "This set of tools includes a small file, a set of lock picks, a small mirror mounted on a metal handle, a set of narrow-bladed scissors, and a pair of pliers. Proficiency with these tools lets you add your proficiency bonus to any ability checks you make to disarm traps or open locks."
    description_ru: "Этот набор инструментов включает маленький напильник, набор отмычек, маленькое зеркало на металлической ручке, узкие ножницы и пассатижи. Владение этими инструментами позволяет добавлять бонус мастерства к любым проверкам характеристик для обезвреживания ловушек или вскрытия замков."
    source_url: https://5thsrd.org/character/equipment/
    srd_section: "SRD 5.1 §Tools / Thieves' Tools"

  - id: tinderbox
    name_en: Tinderbox
    name_ru: Трутница
    cost: { sp: 5 }
    weight_lb: 1
    is_bundle: false
    contents: null
    description_en: "This small container holds flint, fire steel, and tinder (usually dry cloth soaked in light oil) used to kindle a fire. Using it to light a torch-or anything else with abundant, exposed fuel-takes an action. Lighting any other fire takes 1 minute."
    description_ru: "Этот маленький контейнер содержит кремень, огниво и трут (обычно сухую ткань, пропитанную лёгким маслом), используемые для разжигания огня. Использование трутницы для зажжения факела или чего-либо ещё с обильным и открытым горючим занимает действие. Разжигание любого другого огня занимает 1 минуту."
    source_url: https://5thsrd.org/character/equipment/
    srd_section: "SRD 5.1 §Adventuring Gear / Tinderbox"

