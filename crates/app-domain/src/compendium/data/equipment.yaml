  - id: acid-vial
    name_en: Acid (vial)
    name_ru: Кислота (склянка)
    cost: { gp: 25 }
    weight_lb: 1
    is_bundle: false
    contents: null
    description_en: "As an action, you can splash the contents of this vial onto a creature within 5 feet of you or throw the vial up to 20 feet, shattering it on impact. In either case, make a ranged attack against a creature or object, treating the acid as an improvised weapon. On a hit, the target takes 2d6 acid damage."
    description_ru: "Действием вы можете выплеснуть содержимое склянки на существо в пределах 5 футов или метнуть склянку на расстояние до 20 футов, разбив её при ударе. В любом случае совершите дальнобойную атаку по существу или объекту, считая кислоту импровизированным оружием. При попадании цель получает 2d6 урона кислотой."
    source_url: https://5thsrd.org/character/equipment/
    srd_section: "SRD 5.1 §Adventuring Gear / Acid"

  - id: alchemists-fire-flask
    name_en: Alchemist's Fire (flask)
    name_ru: Алхимический огонь (склянка)
    cost: { gp: 50 }
    weight_lb: 1
    is_bundle: false
    contents: null
    description_en: "This sticky, adhesive fluid ignites when exposed to air. As an action, you can throw this flask up to 20 feet, shattering it on impact. Make a ranged attack against a creature or object, treating the alchemist's fire as an improvised weapon. On a hit, the target takes 1d4 fire damage at the start of each of its turns. A creature can end this damage by using its action to make a DC 10 Dexterity check to extinguish the flames."
    description_ru: "Эта липкая клейкая жидкость воспламеняется при контакте с воздухом. Действием вы можете метнуть склянку на расстояние до 20 футов, разбив её при ударе. Совершите дальнобойную атаку по существу или объекту, считая алхимический огонь импровизированным оружием. При попадании цель получает 1d4 урона огнём в начале каждого своего хода. Существо может прекратить этот урон, использовав действие на проверку Ловкости со Сл 10, чтобы потушить пламя."
    source_url: https://5thsrd.org/character/equipment/
    srd_section: "SRD 5.1 §Adventuring Gear / Alchemist's Fire"

  - id: alchemists-supplies
    name_en: Alchemist's Supplies
    name_ru: Инструменты алхимика
    cost: { gp: 50 }
    weight_lb: 8
    is_bundle: false
    contents: null
    description_en: "Alchemist's supplies enable a character to produce useful concoctions, such as acid or alchemist's fire. Proficiency with alchemist's supplies lets you add your proficiency bonus to any ability checks you make to identify or apply alchemical concoctions."
    description_ru: "Инструменты алхимика позволяют персонажу создавать полезные смеси, такие как кислота или алхимический огонь. Владение инструментами алхимика позволяет добавлять бонус мастерства к любым проверкам характеристик для определения или применения алхимических смесей."
    source_url: https://5thsrd.org/character/equipment/
    srd_section: "SRD 5.1 §Tools / Alchemist's Supplies"

  - id: amulet
    name_en: Amulet
    name_ru: Амулет
    cost: { gp: 5 }
    weight_lb: 1
    is_bundle: false
    contents: null
    description_en: "A holy symbol is a representation of a god or pantheon. A cleric or paladin can use a holy symbol as a spellcasting focus. To use the symbol in this way, the caster must hold it in hand, wear it visibly, or bear it on a shield. An amulet is a holy symbol worn around the neck."
    description_ru: "Священный символ - это изображение бога или пантеона. Жрец или паладин может использовать священный символ как фокусировку. Чтобы использовать символ таким образом, заклинатель должен держать его в руке, носить его на видном месте или иметь его на щите. Амулет - это священный символ, носимый на шее."
