    description_ru: "Этот набор инструментов используется для морской навигации. Владение инструментами навигатора позволяет прокладывать курс корабля и следовать навигационным картам. Кроме того, эти инструменты позволяют добавлять бонус мастерства к любым проверкам характеристик, чтобы не заблудиться в море."
    source_url: https://5thsrd.org/character/equipment/
    srd_section: "SRD 5.1 §Tools / Navigator's Tools"

  - id: oil-flask
    name_en: Oil (flask)
    name_ru: Масло (склянка)
    cost: { sp: 1 }
    weight_lb: 1
    is_bundle: false
    contents: null
    description_en: "Oil usually comes in a clay flask that holds 1 pint. As an action, you can splash the oil in this flask onto a creature within 5 feet of you or throw it up to 20 feet, shattering it on impact. Make a ranged attack against a target creature or object, treating the oil as an improvised weapon. On a hit, the target is covered in oil. If the target takes any fire damage before the oil dries (after 1 minute), the target takes an additional 5 fire damage from the burning oil. You can also pour a flask of oil on the ground to cover a 5-foot-square area, provided that the surface is level. If lit, the oil burns for 2 rounds and deals 5 fire damage to any creature that enters the area or ends its turn in the area. A creature can take this damage only once per turn."
    description_ru: "Масло обычно поставляется в глиняной склянке вместимостью 1 пинта. Действием вы можете выплеснуть масло на существо в пределах 5 футов или бросить склянку на расстояние до 20 футов, разбив её при ударе. Совершите дальнобойную атаку по существу или объекту, считая масло импровизированным оружием. При попадании цель покрывается маслом. Если цель получает урон огнём до того, как масло высохнет (через 1 минуту), она получает дополнительные 5 урона огнём от горящего масла. Вы также можете вылить склянку масла на землю, покрывая квадратный участок 5×5 футов, если поверхность ровная. Если масло поджечь, оно горит 2 раунда и наносит 5 урона огнём любому существу, входящему в область или оканчивающему в ней свой ход. Существо может получить этот урон только один раз за ход."
    source_url: https://5thsrd.org/character/equipment/
    srd_section: "SRD 5.1 §Adventuring Gear / Oil"

