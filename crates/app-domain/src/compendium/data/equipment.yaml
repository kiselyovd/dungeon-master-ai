  - id: hunting-trap
    name_en: Hunting Trap
    name_ru: Охотничий капкан
    cost: { gp: 5 }
    weight_lb: 25
    is_bundle: false
    contents: null
    description_en: "When you use your action to set it, this trap forms a saw-toothed steel ring that snaps shut when a creature steps on a pressure plate in the center. The trap is affixed by a heavy chain to an immobile object, such as a tree or a spike driven into the ground. A creature that steps on the plate must succeed on a DC 13 Dexterity saving throw or take 1d4 piercing damage and stop moving. Thereafter, until the creature breaks free of the trap, its movement is limited by the length of the chain (typically 3 feet long). A creature can use its action to make a DC 13 Strength check, freeing itself or another creature within its reach on a success. Each failed check deals 1 piercing damage to the trapped creature."
    description_ru: "Когда вы используете действие, чтобы установить капкан, он образует пилообразное стальное кольцо, защёлкивающееся, когда существо ступает на нажимную пластину в центре. Капкан прикреплён тяжёлой цепью к неподвижному объекту, например, к дереву или к вбитому в землю колышку. Существо, наступившее на пластину, должно совершить успешный спасбросок Ловкости со Сл 13 или получить 1d4 урона колющим и прекратить движение. После этого, пока существо не освободится из капкана, его движение ограничено длиной цепи (обычно 3 фута). Существо может действием совершить проверку Силы со Сл 13, освободив себя или другое существо в пределах досягаемости при успехе. Каждый проваленный бросок наносит 1 урон колющим пойманному существу."
    source_url: https://5thsrd.org/character/equipment/
    srd_section: "SRD 5.1 §Adventuring Gear / Hunting Trap"

