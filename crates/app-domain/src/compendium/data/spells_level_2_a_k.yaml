  - id: blindness-deafness
    name_en: Blindness/Deafness
    name_ru: Слепота/Глухота
    level: 2
    school: necromancy
    casting_time: "1 action"
    range_ft: 30
    components: { v: true, s: false, m: null }
    duration: "1 minute"
    ritual: false
    concentration: false
    classes: [bard, cleric, sorcerer, wizard]
    description_en: |
      You can blind or deafen a foe. Choose one creature that you can see within range to make a Constitution saving throw. If it fails, the target is either blinded or deafened (your choice) for the duration. At the end of each of its turns, the target can make a Constitution saving throw. On a success, the spell ends.
    description_ru: |
      Вы можете ослепить или оглушить врага. Выберите одно существо в пределах дистанции, которое вы видите, чтобы оно совершило спасбросок Телосложения. При провале цель становится либо ослеплённой, либо оглушённой (на ваш выбор) на время действия заклинания. В конце каждого своего хода цель может повторять спасбросок Телосложения. При успехе заклинание оканчивается.
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 3rd level or higher, you can target one additional creature for each slot level above 2nd."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 3-го уровня или выше, вы можете нацелиться на одно дополнительное существо за каждый уровень ячейки выше 2-го."
    damage: null
