    components: { v: true, s: true, m: "a tiny strip of white cloth" }
    duration: "8 hours"
    ritual: false
    concentration: false
    classes: [cleric, paladin]
    description_en: |
      Your spell bolsters your allies with toughness and resolve. Choose up to three creatures within range. Each target's hit point maximum and current hit points increase by 5 for the duration.
    description_ru: |
      Ваше заклинание укрепляет ваших союзников выносливостью и решимостью. Выберите до трёх существ в пределах дистанции. Максимум хитов и текущее количество хитов каждой цели увеличиваются на 5 на время действия заклинания.
    at_higher_levels:
