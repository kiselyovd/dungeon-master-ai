spells:
  - id: acid-arrow
    name_en: Acid Arrow
    name_ru: Кислотная стрела
    level: 2
    school: evocation
    casting_time: "1 action"
    range_ft: 90
    components: { v: true, s: true, m: "powdered rhubarb leaf and an adder's stomach" }
    duration: "Instantaneous"
    ritual: false
    concentration: false
    classes: [wizard]
    description_en: |
      A shimmering green arrow streaks toward a target within range and bursts in a spray of acid. Make a ranged spell attack against the target. On a hit, the target takes 4d4 acid damage immediately and 2d4 acid damage at the end of its next turn. On a miss, the arrow splashes the target with acid for half as much of the initial damage and no damage at the end of its next turn.
    description_ru: |
      Мерцающая зелёная стрела устремляется к цели в пределах дистанции и взрывается брызгами кислоты. Совершите дальнобойную атаку заклинанием по цели. При попадании цель немедленно получает 4к4 урона кислотой и ещё 2к4 урона кислотой в конце своего следующего хода. При промахе стрела обдаёт цель кислотой, нанося половину начального урона, и не наносит урона в конце следующего хода цели.
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 3rd level or higher, the damage (both initial and later) increases by 1d4 for each slot level above 2nd."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 3-го уровня или выше, урон (как начальный, так и последующий) увеличивается на 1к4 за каждый уровень ячейки выше 2-го."
    damage: { dice: "4d4", type: acid }
    attack: { kind: ranged_spell }
    save: null
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/acid_arrow/
    srd_section: "SRD 5.1 §Spells / Acid Arrow"

  - id: aid
