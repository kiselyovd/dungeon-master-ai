  - id: blur
    name_en: Blur
    name_ru: Размытый облик
    level: 2
    school: illusion
    casting_time: "1 action"
    range_ft: "Self"
    components: { v: true, s: false, m: null }
    duration: "Concentration, up to 1 minute"
    ritual: false
    concentration: true
    classes: [sorcerer, wizard]
    description_en: |
      Your body becomes blurred, shifting and wavering to all who can see you. For the duration, any creature has disadvantage on attack rolls against you. An attacker is immune to this effect if it doesn't rely on sight, as with blindsight, or can see through illusions, as with truesight.
    description_ru: |
      Ваше тело становится размытым, колеблющимся и зыбким для всех, кто вас видит. На время действия заклинания любое существо совершает с помехой броски атак по вам. Атакующий не подвержен этому эффекту, если он не полагается на зрение, как при слепом зрении, либо видит сквозь иллюзии, как при истинном зрении.
