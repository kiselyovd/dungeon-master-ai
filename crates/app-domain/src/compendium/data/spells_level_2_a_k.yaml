  - id: alter-self
    name_en: Alter Self
    name_ru: Изменение облика
    level: 2
    school: transmutation
    casting_time: "1 action"
    range_ft: "Self"
    components: { v: true, s: true, m: null }
    duration: "Concentration, up to 1 hour"
    ritual: false
    concentration: true
    classes: [sorcerer, wizard]
    description_en: |
      You assume a different form. When you cast the spell, choose one of the following options, the effects of which last for the duration of the spell. While the spell lasts, you can end one option as an action to gain the benefits of a different one.

      **Aquatic Adaptation.** You adapt your body to an aquatic environment, sprouting gills and growing webbing between your fingers. You can breathe underwater and gain a swimming speed equal to your walking speed.

      **Change Appearance.** You transform your appearance. You decide what you look like, including your height, weight, facial features, sound of your voice, hair length, coloration, and distinguishing characteristics, if any. You can make yourself appear as a member of another race, though none of your statistics change. You also can't appear as a creature of a different size than you, and your basic shape stays the same; if you're bipedal, you can't use this spell to become quadrupedal, for instance. At any time for the duration of the spell, you can use your action to change your appearance in this way again.

      **Natural Weapons.** You grow claws, fangs, spines, horns, or a different natural weapon of your choice. Your unarmed strikes deal 1d6 bludgeoning, piercing, or slashing damage, as appropriate to the natural weapon you chose, and you are proficient with your unarmed strikes. Finally, the natural weapon is magic and you have a +1 bonus to the attack and damage rolls you make using it.
    description_ru: |
      Вы принимаете другой облик. При накладывании этого заклинания выберите один из следующих вариантов, эффект которого действует на протяжении заклинания. Пока действует заклинание, вы можете действием прекратить один эффект и получить выгоду другого.

      **Водная адаптация.** Вы приспосабливаете тело к водной среде, отращиваете жабры и перепонки между пальцами. Вы можете дышать под водой и получаете скорость плавания, равную вашей скорости ходьбы.

      **Изменение внешности.** Вы меняете свою внешность. Вы решаете, как будете выглядеть, включая рост, вес, черты лица, тембр голоса, длину волос, цвет и отличительные особенности, если таковые имеются. Вы можете заставить себя выглядеть представителем другой расы, хотя характеристики не меняются. Вы также не можете выглядеть существом другого размера, а основная форма остаётся той же: если вы двуногий, заклинание не сделает вас четвероногим. В любое время в течение действия заклинания вы можете действием снова изменить свою внешность подобным образом.

      **Природное оружие.** У вас вырастают когти, клыки, шипы, рога или иное природное оружие по вашему выбору. Ваши безоружные удары наносят 1к6 урона дробящего, колющего или рубящего типа, в зависимости от выбранного природного оружия, и вы владеете своими безоружными ударами. Наконец, природное оружие магическое, и вы получаете бонус +1 к броскам атаки и урона им.
    at_higher_levels: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/alter_self/
    srd_section: "SRD 5.1 §Spells / Alter Self"

  - id: animal-messenger
    name_en: Animal Messenger
    name_ru: Звериный посланник
    level: 2
    school: enchantment
    casting_time: "1 action"
    range_ft: 30
    components: { v: true, s: true, m: "a morsel of food" }
    duration: "24 hours"
    ritual: true
    concentration: false
    classes: [bard, druid, ranger]
    description_en: |
      By means of this spell, you use an animal to deliver a message. Choose a Tiny beast you can see within range, such as a squirrel, a blue jay, or a bat. You specify a location, which you must have visited, and a recipient who matches a general description, such as "a man or woman dressed in the uniform of the town guard" or "a red-haired dwarf wearing a pointed hat." You also speak a message of up to twenty-five words. The target beast travels for the duration of the spell toward the specified location, covering about 50 miles per 24 hours for a flying messenger, or 25 miles for other animals.

      When the messenger arrives, it delivers your message to the creature that you described, replicating the sound of your voice. The messenger speaks only to a creature matching the description you gave. If the messenger doesn't reach its destination before the spell ends, the message is lost, and the beast makes its way back to where you cast this spell.
    description_ru: |
      Посредством этого заклинания вы используете животное для доставки послания. Выберите Крошечного зверя в пределах дистанции, которого вы видите, например белку, сойку или летучую мышь. Вы указываете место, в котором вы когда-либо были, и получателя, подходящего под общее описание, например "мужчина или женщина в форме городской стражи" или "рыжебородый дварф в остроконечной шляпе". Вы также произносите послание длиной до двадцати пяти слов. Целевой зверь движется в течение действия заклинания к указанному месту, преодолевая около 50 миль за 24 часа для летающего посланника или 25 миль для прочих животных.

      По прибытии посланник доставляет ваше послание существу, подходящему под описание, воспроизводя звук вашего голоса. Посланник заговорит только с существом, подходящим под данное вами описание. Если посланник не доберётся до места назначения до окончания заклинания, послание теряется, а зверь возвращается туда, где вы наложили это заклинание.
    at_higher_levels:
      en: "If you cast this spell using a spell slot of 3rd level or higher, the duration of the spell increases by 48 hours for each slot level above 2nd."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 3-го уровня или выше, длительность заклинания увеличивается на 48 часов за каждый уровень ячейки выше 2-го."
    damage: null
    attack: null
    save: null
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/animal_messenger/
    srd_section: "SRD 5.1 §Spells / Animal Messenger"

  - id: arcane-lock
    name_en: Arcane Lock
    name_ru: Магический замок
    level: 2
    school: abjuration
    casting_time: "1 action"
    range_ft: "Touch"
    components: { v: true, s: true, m: "gold dust worth at least 25 gp, which the spell consumes" }
    duration: "Until dispelled"
    ritual: false
    concentration: false
    classes: [wizard]
    description_en: |
      You touch a closed door, window, gate, chest, or other entryway, and it becomes locked for the duration. You and the creatures you designate when you cast this spell can open the object normally. You can also set a password that, when spoken within 5 feet of the object, suppresses this spell for 1 minute. Otherwise, it is impassable until it is broken or the spell is dispelled or suppressed. Casting knock on the object suppresses arcane lock for 10 minutes. While affected by this spell, the object is more difficult to break or force open; the DC to break it or pick any locks on it increases by 10.
    description_ru: |
      Вы прикасаетесь к закрытой двери, окну, воротам, сундуку или иному проходу, и они становятся запертыми на время действия заклинания. Вы и существа, указанные вами при наложении заклинания, можете открывать предмет как обычно. Вы также можете установить пароль, который при произнесении в пределах 5 футов от предмета подавляет это заклинание на 1 минуту. В остальных случаях предмет непроходим, пока не будет сломан, либо заклинание не будет рассеяно или подавлено. Накладывание стука на предмет подавляет магический замок на 10 минут. На время действия заклинания предмет становится труднее сломать или взломать: Сл проверок для этого увеличивается на 10.
    at_higher_levels: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/arcane_lock/
    srd_section: "SRD 5.1 §Spells / Arcane Lock"

  - id: arcanists-magic-aura
    name_en: Arcanist's Magic Aura
    name_ru: Магическая аура чародея
    level: 2
    school: illusion
    casting_time: "1 action"
    range_ft: "Touch"
    components: { v: true, s: true, m: "a small square of silk" }
    duration: "24 hours"
    ritual: false
    concentration: false
    classes: [wizard]
    description_en: |
      You place an illusion on a creature or an object you touch so that divination spells reveal false information about it. The target can be a willing creature or an object that isn't being carried or worn by another creature. When you cast the spell, choose one or both of the following effects. The effect lasts for the duration. If you cast this spell on the same creature or object every day for 30 days, placing the same effect on it each time, the illusion lasts until it is dispelled.

      **False Aura.** You change the way the target appears to spells and magical effects, such as detect magic, that detect magical auras. You can make a nonmagical object appear magical, a magical object appear nonmagical, or change the object's magical aura so that it appears to belong to a specific school of magic that you choose. When you use this effect on an object, you can make the false magic apparent to any creature that handles the item.

      **Mask.** You change the way the target appears to spells and magical effects that detect creature types, such as a paladin's Divine Sense or the trigger of a symbol spell. You choose a creature type and other spells and magical effects treat the target as if it were a creature of that type or of that alignment.
    description_ru: |
      Вы помещаете иллюзию на существо или предмет, которого касаетесь, так что заклинания школы Прорицания дают о нём ложные сведения. Целью может быть согласное существо или предмет, который не носится и не находится у другого существа. При накладывании заклинания выберите один или оба следующих эффекта. Эффект длится в течение действия заклинания. Если вы накладываете это заклинание на одно и то же существо или предмет ежедневно в течение 30 дней, помещая на него один и тот же эффект, иллюзия длится до рассеяния.

      **Ложная аура.** Вы меняете то, как цель воспринимается заклинаниями и магическими эффектами, такими как обнаружение магии, которые обнаруживают магические ауры. Вы можете сделать немагический предмет магическим, магический немагическим, либо изменить магическую ауру предмета так, чтобы она казалась принадлежащей к выбранной вами школе магии. Применяя этот эффект к предмету, вы можете сделать ложную магию очевидной для любого существа, прикасающегося к нему.

      **Маска.** Вы меняете то, как цель воспринимается заклинаниями и магическими эффектами, обнаруживающими типы существ, например Божественным чутьём паладина или активацией заклинания «Символ». Вы выбираете тип существа, и прочие заклинания и магические эффекты обращаются с целью как с существом этого типа или мировоззрения.
    at_higher_levels: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
