  - id: detect-thoughts
    name_en: Detect Thoughts
    name_ru: Обнаружение мыслей
    level: 2
    school: divination
    casting_time: "1 action"
    range_ft: "Self"
    components: { v: true, s: true, m: "a copper coin" }
    duration: "Concentration, up to 1 minute"
    ritual: false
    concentration: true
    classes: [bard, sorcerer, wizard]
    description_en: |
      For the duration, you can read the thoughts of certain creatures. When you cast the spell and as your action on each turn until the spell ends, you can focus your mind on any one creature that you can see within 30 feet of you. If the creature you choose has an Intelligence of 3 or lower or doesn't speak any language, the creature is unaffected. You initially learn the surface thoughts of the creature - what is most on its mind in that moment. As an action, you can either shift your attention to another creature's thoughts or attempt to probe deeper into the same creature's mind. If you probe deeper, the target must make a Wisdom saving throw. If it fails, you gain insight into its reasoning (if any), its emotional state, and something that looms large in its mind (such as something it worries over, loves, or hates). If it succeeds, the spell ends. Either way, the target knows that you are probing into its mind, and unless you shift your attention to another creature's thoughts, the creature can use its action on its turn to make an Intelligence check contested by your Intelligence check; if it succeeds, the spell ends. Questions verbally directed at the target creature naturally shape the course of its thoughts, so this spell is particularly effective as part of an interrogation. You can also use this spell to detect the presence of thinking creatures you can't see. When you cast the spell or as your action during the duration, you can search for thoughts within 30 feet of you. The spell can penetrate barriers, but 2 feet of rock, 2 inches of any metal other than lead, or a thin sheet of lead blocks you. You can't detect a creature with an Intelligence of 3 or lower or one that doesn't speak any language. Once you detect the presence of a creature in this way, you can read its thoughts for the rest of the duration as described above, even if you can't see it, but it must still be within range.
    description_ru: |
      На время действия заклинания вы можете читать мысли определённых существ. При накладывании заклинания и затем действием в каждом своём ходу до окончания заклинания вы можете сосредоточить разум на одном существе, которое вы видите в пределах 30 футов от себя. Если у выбранного существа Интеллект 3 или ниже либо оно не говорит ни на одном языке, оно не подвержено эффекту. Сначала вы узнаёте поверхностные мысли существа - то, что больше всего занимает его в данный момент. Действием вы можете либо переключить внимание на мысли другого существа, либо попытаться проникнуть глубже в разум того же существа. Если вы проникаете глубже, цель должна совершить спасбросок Мудрости. При провале вы получаете представление о её рассуждениях (если таковые есть), эмоциональном состоянии и чём-то значительном, что занимает её разум (например, о чём-то, что её беспокоит, что она любит или ненавидит). При успехе заклинание оканчивается. В любом случае цель знает, что вы исследуете её разум, и, если вы не переключаете внимание на другое существо, она может действием в свой ход совершить проверку Интеллекта, противопоставленную вашей проверке Интеллекта; при успехе заклинание оканчивается. Вопросы, заданные цели вслух, естественным образом направляют ход её мыслей, поэтому это заклинание особенно эффективно в ходе допроса. Вы также можете использовать это заклинание для обнаружения присутствия мыслящих существ, которых вы не видите. При накладывании заклинания либо действием в ходе его действия вы можете искать мысли в пределах 30 футов от себя. Заклинание проникает сквозь преграды, но 2 фута камня, 2 дюйма любого металла кроме свинца или тонкий лист свинца блокируют его. Вы не можете обнаружить существо с Интеллектом 3 или ниже либо не говорящее ни на одном языке. Обнаружив существо таким образом, вы можете читать его мысли до конца длительности заклинания, как описано выше, даже если не видите его, но оно всё равно должно находиться в пределах дистанции.
    at_higher_levels: null
    damage: null
    attack: null
    save: { ability: wis, half_on_success: false }
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/detect_thoughts/
    srd_section: "SRD 5.1 §Spells / Detect Thoughts"

  - id: enhance-ability
    name_en: Enhance Ability
    name_ru: Улучшение характеристики
    level: 2
    school: transmutation
    casting_time: "1 action"
    range_ft: "Touch"
    components: { v: true, s: true, m: "fur or a feather from a beast" }
    duration: "Concentration, up to 1 hour"
    ritual: false
    concentration: true
    classes: [bard, cleric, druid, sorcerer]
    description_en: |
      You touch a creature and bestow upon it a magical enhancement. Choose one of the following effects; the target gains that effect until the spell ends.

      **Bear's Endurance.** The target has advantage on Constitution checks. It also gains 2d6 temporary hit points, which are lost when the spell ends.

      **Bull's Strength.** The target has advantage on Strength checks, and his or her carrying capacity doubles.

      **Cat's Grace.** The target has advantage on Dexterity checks. It also doesn't take damage from falling 20 feet or less if it isn't incapacitated.

      **Eagle's Splendor.** The target has advantage on Charisma checks.

      **Fox's Cunning.** The target has advantage on Intelligence checks.

      **Owl's Wisdom.** The target has advantage on Wisdom checks.
    description_ru: |
      Вы касаетесь существа и наделяете его магическим улучшением. Выберите один из следующих эффектов; цель получает этот эффект до окончания заклинания.

      **Выносливость медведя.** Цель совершает с преимуществом проверки Телосложения. Она также получает 2к6 временных хитов, которые теряются по окончании заклинания.

      **Сила быка.** Цель совершает с преимуществом проверки Силы, а её грузоподъёмность удваивается.

      **Кошачья ловкость.** Цель совершает с преимуществом проверки Ловкости. Кроме того, она не получает урона при падении с высоты 20 футов или меньше, если не недееспособна.

      **Орлиное великолепие.** Цель совершает с преимуществом проверки Харизмы.

      **Лисья хитрость.** Цель совершает с преимуществом проверки Интеллекта.

      **Совиная мудрость.** Цель совершает с преимуществом проверки Мудрости.
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 3rd level or higher, you can target one additional creature for each slot level above 2nd."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 3-го уровня или выше, вы можете нацелиться на одно дополнительное существо за каждый уровень ячейки выше 2-го."
    damage: null
    attack: null
    save: null
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/enhance_ability/
    srd_section: "SRD 5.1 §Spells / Enhance Ability"

  - id: enlarge-reduce
    name_en: Enlarge/Reduce
    name_ru: Увеличение/Уменьшение
    level: 2
    school: transmutation
    casting_time: "1 action"
    range_ft: 30
    components: { v: true, s: true, m: "a pinch of powdered iron" }
    duration: "Concentration, up to 1 minute"
    ritual: false
    concentration: true
    classes: [sorcerer, wizard]
    description_en: |
      You cause a creature or an object you can see within range to grow larger or smaller for the duration. Choose either a creature or an object that is neither worn nor carried. If the target is unwilling, it can make a Constitution saving throw. On a success, the spell has no effect. If the target is a creature, everything it is wearing and carrying changes size with it. Any item dropped by an affected creature returns to normal size at once.

      **Enlarge.** The target's size doubles in all dimensions, and its weight is multiplied by eight. This growth increases its size by one category - from Medium to Large, for example. If there isn't enough room for the target to double its size, the creature or object attains the maximum possible size in the space available. Until the spell ends, the target also has advantage on Strength checks and Strength saving throws. The target's weapons also grow to match its new size. While these weapons are enlarged, the target's attacks with them deal 1d4 extra damage.

      **Reduce.** The target's size is halved in all dimensions, and its weight is reduced to one-eighth of normal. This reduction decreases its size by one category - from Medium to Small, for example. Until the spell ends, the target also has disadvantage on Strength checks and Strength saving throws. The target's weapons also shrink to match its new size. While these weapons are reduced, the target's attacks with them deal 1d4 less damage (this can't reduce the damage below 1).
    description_ru: |
      Вы заставляете существо или предмет в пределах дистанции, который видите, увеличиться или уменьшиться на время действия заклинания. Выберите существо или предмет, который не носится и не находится у кого-либо. Если цель не согласна, она может совершить спасбросок Телосложения. При успехе заклинание не оказывает на неё эффекта. Если цель - существо, всё, что она носит и держит, меняет размер вместе с ней. Любой предмет, оброненный затронутым существом, немедленно возвращается к обычному размеру.

      **Увеличение.** Размер цели удваивается во всех измерениях, а вес умножается на восемь. Этот рост увеличивает её размер на одну категорию - например, со Среднего до Большого. Если для удвоения размера цели не хватает места, существо или предмет принимает максимальный возможный размер в доступном пространстве. До окончания заклинания цель также совершает с преимуществом проверки Силы и спасброски Силы. Оружие цели тоже увеличивается под её новый размер. Пока это оружие увеличено, атаки им наносят дополнительные 1к4 урона.

      **Уменьшение.** Размер цели уменьшается вдвое во всех измерениях, а вес уменьшается до одной восьмой от обычного. Это уменьшение снижает её размер на одну категорию - например, со Среднего до Маленького. До окончания заклинания цель также совершает с помехой проверки Силы и спасброски Силы. Оружие цели тоже уменьшается под её новый размер. Пока это оружие уменьшено, атаки им наносят на 1к4 урона меньше (но не ниже 1).
    at_higher_levels: null
    damage: null
    attack: null
    save: { ability: con, half_on_success: false }
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/enlarge_reduce/
    srd_section: "SRD 5.1 §Spells / Enlarge/Reduce"

  - id: enthrall
    name_en: Enthrall
    name_ru: Покорение
    level: 2
    school: enchantment
    casting_time: "1 action"
    range_ft: 60
    components: { v: true, s: true, m: null }
    duration: "1 minute"
    ritual: false
    concentration: false
    classes: [bard, warlock]
    description_en: |
      You weave a distracting string of words, causing creatures of your choice that you can see within range and that can hear you to make a Wisdom saving throw. Any creature that can't be charmed succeeds on this saving throw automatically, and if you or your companions are fighting a creature, it has advantage on the save. On a failed save, the target has disadvantage on Wisdom (Perception) checks made to perceive any creature other than you until the spell ends or until the target can no longer hear you. The spell ends if you are incapacitated or can no longer speak.
    description_ru: |
      Вы плетёте отвлекающую вязь слов, заставляя выбранных вами существ в пределах дистанции, которые вас слышат, совершить спасбросок Мудрости. Любое существо, которое нельзя очаровать, автоматически преуспевает в этом спасброске, а если вы или ваши товарищи сражаетесь с существом, оно совершает спасбросок с преимуществом. При провале цель совершает с помехой проверки Мудрости (Внимание) для обнаружения любых существ кроме вас, пока заклинание не закончится либо пока цель не перестанет вас слышать. Заклинание оканчивается, если вы стали недееспособны либо больше не можете говорить.
    at_higher_levels: null
    damage: null
    attack: null
    save: { ability: wis, half_on_success: false }
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/enthrall/
    srd_section: "SRD 5.1 §Spells / Enthrall"

  - id: find-steed
    name_en: Find Steed
    name_ru: Поиск скакуна
    level: 2
    school: conjuration
    casting_time: "10 minutes"
    range_ft: 30
    components: { v: true, s: true, m: null }
    duration: "Instantaneous"
    ritual: false
    concentration: false
    classes: [paladin]
    description_en: |
      You summon a spirit that assumes the form of an unusually intelligent, strong, and loyal steed, creating a long-lasting bond with it. Appearing in an unoccupied space within range, the steed takes on a form that you choose, such as a warhorse, a pony, a camel, an elk, or a mastiff. (Your DM might allow other animals to be summoned as steeds.) The steed has the statistics of the chosen form, though it is a celestial, fey, or fiend (your choice) instead of its normal type. Additionally, if your steed has an Intelligence of 5 or less, its Intelligence becomes 6, and it gains the ability to understand one language of your choice that you speak. Your steed serves you as a mount, both in combat and out, and you have an instinctive bond with it that allows you to fight as a seamless unit. While mounted on your steed, you can make any spell you cast that targets only you also target your steed. When the steed drops to 0 hit points, it disappears, leaving behind no physical form. You can also dismiss your steed at any time as an action, causing it to disappear. In either case, casting this spell again summons the same steed, restored to its hit point maximum. While your steed is within 1 mile of you, you can communicate with it telepathically. You can't have more than one steed bonded by this spell at a time. As an action, you can release the steed from its bond at any time, causing it to disappear.
    description_ru: |
      Вы призываете дух, принимающий форму необычно умного, сильного и преданного скакуна, и создаёте с ним длительную связь. Появляясь в свободном пространстве в пределах дистанции, скакун принимает форму по вашему выбору, например боевой лошади, пони, верблюда, лося или мастифа. (Ваш Мастер может разрешить призывать другие виды животных в качестве скакунов.) У скакуна характеристики выбранной формы, но он является небожителем, феей или исчадием (на ваш выбор) вместо обычного типа. Кроме того, если Интеллект вашего скакуна 5 или меньше, его Интеллект становится 6, и он получает способность понимать один выбранный вами язык, на котором говорите вы. Ваш скакун служит вам верховым животным как в бою, так и вне его, и вы обладаете инстинктивной связью с ним, позволяющей сражаться как одно целое. Будучи верхом на скакуне, любое заклинание, нацеленное только на вас, вы можете нацелить и на скакуна. Когда хиты скакуна опускаются до 0, он исчезает, не оставляя физической формы. Вы также можете действием в любой момент отпустить скакуна, и он исчезнет. В обоих случаях повторное наложение этого заклинания призывает того же скакуна, восстановленного до максимума хитов. Пока скакун находится в пределах 1 мили от вас, вы можете телепатически общаться с ним. У вас не может быть более одного скакуна, связанного этим заклинанием. Действием вы можете в любое время разорвать связь со скакуном, и он исчезнет.
    at_higher_levels: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/find_steed/
    srd_section: "SRD 5.1 §Spells / Find Steed"

  - id: find-traps
    name_en: Find Traps
    name_ru: Поиск ловушек
    level: 2
    school: divination
    casting_time: "1 action"
    range_ft: 120
    components: { v: true, s: true, m: null }
    duration: "Instantaneous"
    ritual: false
    concentration: false
    classes: [cleric, druid, ranger]
    description_en: |
      You sense the presence of any trap within range that is within line of sight. A trap, for the purpose of this spell, includes anything that would inflict a sudden or unexpected effect you consider harmful or undesirable, which was specifically intended as such by its creator. Thus, the spell would sense an area affected by the alarm spell, a glyph of warding, or a mechanical pit trap, but it would not reveal a natural weakness in the floor, an unstable ceiling, or a hidden sinkhole. This spell merely reveals that a trap is present. You don't learn the location of each trap, but you do learn the general nature of the danger posed by a trap you sense.
    description_ru: |
      Вы ощущаете присутствие любой ловушки в пределах дистанции, находящейся в пределах линии обзора. Ловушкой для целей этого заклинания считается всё, что наносит внезапный или неожиданный эффект, который вы считаете вредным или нежелательным, и было специально задумано таковым своим создателем. Таким образом, заклинание ощутит область, затронутую заклинанием «Тревога», охранным знаком или механической ямой-ловушкой, но не выявит естественной слабости пола, неустойчивого потолка или скрытого провала. Заклинание лишь обнаруживает присутствие ловушки. Вы не узнаёте местоположения каждой ловушки, но узнаёте общую природу опасности, которую представляет обнаруженная ловушка.
    at_higher_levels: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/find_traps/
    srd_section: "SRD 5.1 §Spells / Find Traps"

  - id: flame-blade
    name_en: Flame Blade
    name_ru: Огненный клинок
    level: 2
    school: evocation
    casting_time: "1 bonus action"
    range_ft: "Self"
    components: { v: true, s: true, m: "leaf of sumac" }
    duration: "Concentration, up to 10 minutes"
    ritual: false
    concentration: true
    classes: [druid]
    description_en: |
      You evoke a fiery blade in your free hand. The blade is similar in size and shape to a scimitar, and it lasts for the duration. If you let go of the blade, it disappears, but you can evoke the blade again as a bonus action. You can use your action to make a melee spell attack with the fiery blade. On a hit, the target takes 3d6 fire damage. The flaming blade sheds bright light in a 10-foot radius and dim light for an additional 10 feet.
    description_ru: |
      Вы воплощаете огненный клинок в своей свободной руке. Клинок похож по размеру и форме на скимитар и существует на время действия заклинания. Если вы отпустите клинок, он исчезает, но вы можете воплотить его заново бонусным действием. Вы можете действием совершить рукопашную атаку заклинанием огненным клинком. При попадании цель получает 3к6 урона огнём. Огненный клинок испускает яркий свет в радиусе 10 футов и тусклый свет ещё на 10 футов.
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 4th level or higher, the damage increases by 1d6 for every two slot levels above 2nd."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 4-го уровня или выше, урон увеличивается на 1к6 за каждые два уровня ячейки выше 2-го."
    damage: { dice: "3d6", type: fire }
    attack: { kind: melee_spell }
    save: null
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/flame_blade/
    srd_section: "SRD 5.1 §Spells / Flame Blade"

  - id: flaming-sphere
    name_en: Flaming Sphere
    name_ru: Огненная сфера
    level: 2
    school: conjuration
    casting_time: "1 action"
    range_ft: 60
    components: { v: true, s: true, m: "a bit of tallow, a pinch of brimstone, and a dusting of powdered iron" }
    duration: "Concentration, up to 1 minute"
    ritual: false
    concentration: true
    classes: [druid, wizard]
    description_en: |
      A 5-foot-diameter sphere of fire appears in an unoccupied space of your choice within range and lasts for the duration. Any creature that ends its turn within 5 feet of the sphere must make a Dexterity saving throw. The creature takes 2d6 fire damage on a failed save, or half as much damage on a successful one. As a bonus action, you can move the sphere up to 30 feet. If you ram the sphere into a creature, that creature must make the saving throw against the sphere's damage, and the sphere stops moving this turn. When you move the sphere, you can direct it over barriers up to 5 feet tall and jump it across pits up to 10 feet wide. The sphere ignites flammable objects not being worn or carried, and it sheds bright light in a 20-foot radius and dim light for an additional 20 feet.
    description_ru: |
      Сфера огня диаметром 5 футов появляется в свободном пространстве по вашему выбору в пределах дистанции и существует на время действия заклинания. Любое существо, оканчивающее ход в пределах 5 футов от сферы, должно совершить спасбросок Ловкости. Существо получает 2к6 урона огнём при провале или половину этого урона при успехе. Бонусным действием вы можете передвинуть сферу на расстояние до 30 футов. Если вы тараните существо сферой, оно должно совершить спасбросок против её урона, а сфера в этом ходу больше не движется. Перемещая сферу, вы можете направлять её через препятствия высотой до 5 футов и перепрыгивать ею ямы шириной до 10 футов. Сфера поджигает воспламеняемые предметы, которые не носятся и не находятся у кого-либо, испускает яркий свет в радиусе 20 футов и тусклый свет ещё на 20 футов.
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 3rd level or higher, the damage increases by 1d6 for each slot level above 2nd."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 3-го уровня или выше, урон увеличивается на 1к6 за каждый уровень ячейки выше 2-го."
    damage: { dice: "2d6", type: fire }
    attack: null
    save: { ability: dex, half_on_success: true }
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/flaming_sphere/
    srd_section: "SRD 5.1 §Spells / Flaming Sphere"

  - id: gentle-repose
    name_en: Gentle Repose
    name_ru: Тихий покой
    level: 2
    school: necromancy
    casting_time: "1 action"
    range_ft: "Touch"
    components: { v: true, s: true, m: "a pinch of salt and one copper piece placed on each of the corpse's eyes, which must remain there for the duration" }
    duration: "10 days"
    ritual: true
    concentration: false
    classes: [cleric, wizard]
    description_en: |
      You touch a corpse or other remains. For the duration, the target is protected from decay and can't become undead. The spell also effectively extends the time limit on raising the target from the dead, since days spent under the influence of this spell don't count against the time limit of spells such as raise dead.
    description_ru: |
      Вы касаетесь трупа или иных останков. На время действия заклинания цель защищена от разложения и не может стать нежитью. Заклинание также фактически продлевает срок поднятия цели из мёртвых, поскольку дни, проведённые под действием этого заклинания, не учитываются в сроках действия таких заклинаний, как «Воскрешение мёртвого».
    at_higher_levels: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/gentle_repose/
    srd_section: "SRD 5.1 §Spells / Gentle Repose"

  - id: gust-of-wind
    name_en: Gust of Wind
    name_ru: Порыв ветра
    level: 2
    school: evocation
    casting_time: "1 action"
    range_ft: "Self (60-foot line)"
    components: { v: true, s: true, m: "a legume seed" }
    duration: "Concentration, up to 1 minute"
    ritual: false
    concentration: true
    classes: [druid, sorcerer, wizard]
    description_en: |
      A line of strong wind 60 feet long and 10 feet wide blasts from you in a direction you choose for the spell's duration. Each creature that starts its turn in the line must succeed on a Strength saving throw or be pushed 15 feet away from you in a direction following the line. Any creature in the line must spend 2 feet of movement for every 1 foot it moves when moving closer to you. The gust disperses gas or vapor, and it extinguishes candles, torches, and similar unprotected flames in the area. It causes protected flames, such as those of lanterns, to dance wildly and has a 50 percent chance to extinguish them. As a bonus action on each of your turns before the spell ends, you can change the direction in which the line blasts from you.
    description_ru: |
      Линия сильного ветра длиной 60 футов и шириной 10 футов исходит от вас в выбранном вами направлении на время действия заклинания. Каждое существо, начинающее ход в линии, должно преуспеть в спасброске Силы либо быть отброшенным на 15 футов от вас в направлении линии. Любое существо в линии должно тратить 2 фута перемещения за каждый 1 фут движения, если двигается ближе к вам. Порыв разгоняет газ или пар, гасит свечи, факелы и подобное незащищённое пламя в области. Защищённое пламя, например в фонарях, начинает беспорядочно колыхаться, и шанс затушить его - 50 процентов. Бонусным действием в каждом из своих ходов до окончания заклинания вы можете изменить направление, в котором линия исходит от вас.
    at_higher_levels: null
    damage: null
    attack: null
    save: { ability: str, half_on_success: false }
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/gust_of_wind/
    srd_section: "SRD 5.1 §Spells / Gust of Wind"

  - id: heat-metal
    name_en: Heat Metal
    name_ru: Раскаление металла
    level: 2
    school: transmutation
    casting_time: "1 action"
    range_ft: 60
    components: { v: true, s: true, m: "a piece of iron and a flame" }
    duration: "Concentration, up to 1 minute"
    ritual: false
    concentration: true
    classes: [bard, druid]
    description_en: |
      Choose a manufactured metal object, such as a metal weapon or a suit of heavy or medium metal armor, that you can see within range. You cause the object to glow red-hot. Any creature in physical contact with the object takes 2d8 fire damage when you cast the spell. Until the spell ends, you can use a bonus action on each of your subsequent turns to cause this damage again. If a creature is holding or wearing the object and takes the damage from it, the creature must succeed on a Constitution saving throw or drop the object if it can. If it doesn't drop the object, it has disadvantage on attack rolls and ability checks until the start of your next turn.
    description_ru: |
      Выберите изготовленный металлический предмет в пределах дистанции, который вы видите, например металлическое оружие или комплект тяжёлого или среднего металлического доспеха. Вы заставляете предмет раскалиться докрасна. Любое существо в физическом контакте с предметом получает 2к8 урона огнём при накладывании заклинания. До окончания заклинания вы можете бонусным действием в каждом из своих последующих ходов снова нанести этот урон. Если существо держит или носит предмет и получает от него урон, оно должно преуспеть в спасброске Телосложения либо уронить предмет, если может. Если оно не роняет предмет, оно совершает с помехой броски атак и проверки характеристик до начала вашего следующего хода.
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 3rd level or higher, the damage increases by 1d8 for each slot level above 2nd."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 3-го уровня или выше, урон увеличивается на 1к8 за каждый уровень ячейки выше 2-го."
    damage: { dice: "2d8", type: fire }
    attack: null
    save: { ability: con, half_on_success: false }
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/heat_metal/
    srd_section: "SRD 5.1 §Spells / Heat Metal"

  - id: hold-person
    name_en: Hold Person
    name_ru: Удержание личности
    level: 2
    school: enchantment
    casting_time: "1 action"
    range_ft: 60
    components: { v: true, s: true, m: "a small, straight piece of iron" }
    duration: "Concentration, up to 1 minute"
    ritual: false
    concentration: true
    classes: [bard, cleric, druid, sorcerer, warlock, wizard]
    description_en: |
      Choose a humanoid that you can see within range. The target must succeed on a Wisdom saving throw or be paralyzed for the duration. At the end of each of its turns, the target can make another Wisdom saving throw. On a success, the spell ends on the target.
    description_ru: |
      Выберите гуманоида в пределах дистанции, которого видите. Цель должна преуспеть в спасброске Мудрости либо быть парализована на время действия заклинания. В конце каждого своего хода цель может повторять спасбросок Мудрости. При успехе заклинание оканчивается для цели.
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 3rd level or higher, you can target one additional humanoid for each slot level above 2nd. The humanoids must be within 30 feet of each other when you target them."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 3-го уровня или выше, вы можете нацелиться на одного дополнительного гуманоида за каждый уровень ячейки выше 2-го. Гуманоиды должны находиться в пределах 30 футов друг от друга, когда вы их выбираете."
    damage: null
    attack: null
    save: { ability: wis, half_on_success: false }
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/hold_person/
    srd_section: "SRD 5.1 §Spells / Hold Person"

  - id: invisibility
    name_en: Invisibility
    name_ru: Невидимость
    level: 2
    school: illusion
    casting_time: "1 action"
    range_ft: "Touch"
    components: { v: true, s: true, m: "an eyelash encased in gum arabic" }
    duration: "Concentration, up to 1 hour"
    ritual: false
    concentration: true
    classes: [bard, sorcerer, warlock, wizard]
    description_en: |
      A creature you touch becomes invisible until the spell ends. Anything the target is wearing or carrying is invisible as long as it is on the target's person. The spell ends for a target that attacks or casts a spell.
    description_ru: |
      Существо, которого вы касаетесь, становится невидимым до окончания заклинания. Всё, что цель носит и держит, становится невидимым, пока находится у неё. Заклинание оканчивается для цели, которая атакует или накладывает заклинание.
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 3rd level or higher, you can target one additional creature for each slot level above 2nd."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 3-го уровня или выше, вы можете нацелиться на одно дополнительное существо за каждый уровень ячейки выше 2-го."
    damage: null
    attack: null
    save: null
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/invisibility/
    srd_section: "SRD 5.1 §Spells / Invisibility"

  - id: knock
    name_en: Knock
    name_ru: Стук
    level: 2
    school: transmutation
    casting_time: "1 action"
    range_ft: 60
    components: { v: true, s: false, m: null }
    duration: "Instantaneous"
    ritual: false
    concentration: false
    classes: [bard, sorcerer, wizard]
    description_en: |
      Choose an object that you can see within range. The object can be a door, a box, a chest, a set of manacles, a padlock, or another object that contains a mundane or magical means that prevents access. A target that is held shut by a mundane lock or that is stuck or barred becomes unlocked, unstuck, or unbarred. If the object has multiple locks, only one of them is unlocked. If you choose a target that is held shut with arcane lock, that spell is suppressed for 10 minutes, during which time the target can be opened and shut normally. When you cast the spell, a loud knock, audible from as far away as 300 feet, emanates from the target object.
    description_ru: |
      Выберите предмет в пределах дистанции, который видите. Предмет может быть дверью, коробкой, сундуком, наручниками, висячим замком или иным предметом, содержащим мирское или магическое средство, препятствующее доступу. Цель, удерживаемая закрытой обычным замком, заклинённая или забаррикадированная, становится отпертой, разблокированной или освобождённой. Если у предмета несколько замков, отпирается только один из них. Если выбранная цель удерживается закрытой магическим замком, это заклинание подавляется на 10 минут, в течение которых цель можно открывать и закрывать как обычно. При накладывании заклинания от целевого предмета исходит громкий стук, слышимый на расстоянии до 300 футов.
    at_higher_levels: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/knock/
    srd_section: "SRD 5.1 §Spells / Knock"
