  - id: darkness
    name_en: Darkness
    name_ru: Тьма
    level: 2
    school: evocation
    casting_time: "1 action"
    range_ft: 60
    components: { v: true, s: false, m: "bat fur and a drop of pitch or piece of coal" }
    duration: "Concentration, up to 10 minutes"
    ritual: false
    concentration: true
    classes: [sorcerer, warlock, wizard]
    description_en: |
      Magical darkness spreads from a point you choose within range to fill a 15-foot-radius sphere for the duration. The darkness spreads around corners. A creature with darkvision can't see through this darkness, and nonmagical light can't illuminate it. If the point you choose is on an object you are holding or one that isn't being worn or carried, the darkness emanates from the object and moves with it. Completely covering the source of the darkness with an opaque object, such as a bowl or a helm, blocks the darkness. If any of this spell's area overlaps with an area of light created by a spell of 2nd level or lower, the spell that created the light is dispelled.
    description_ru: |
      Магическая тьма распространяется из точки, выбранной вами в пределах дистанции, заполняя сферу радиусом 15 футов на время действия заклинания. Тьма огибает углы. Существо с тёмным зрением не может видеть сквозь эту тьму, а немагический свет не может её осветить. Если выбранная вами точка находится на предмете, который вы держите либо который не носится и не находится у кого-либо, тьма исходит от предмета и движется вместе с ним. Полное укрытие источника тьмы непрозрачным предметом, например миской или шлемом, блокирует тьму. Если область этого заклинания пересекается с областью света, созданной заклинанием 2-го уровня или ниже, заклинание, создавшее свет, рассеивается.
    at_higher_levels: null
    damage: null
    attack: null
    save: null
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/darkness/
    srd_section: "SRD 5.1 §Spells / Darkness"

  - id: darkvision
    name_en: Darkvision
    name_ru: Тёмное зрение
    level: 2
    school: transmutation
    casting_time: "1 action"
