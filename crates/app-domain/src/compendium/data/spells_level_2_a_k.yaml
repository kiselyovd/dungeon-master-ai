      You touch a willing creature to grant it the ability to see in the dark. For the duration, that creature has darkvision out to a range of 60 feet.
    description_ru: |
      Вы касаетесь согласного существа, чтобы даровать ему способность видеть в темноте. На время действия заклинания это существо обладает тёмным зрением с дальностью 60 футов.
