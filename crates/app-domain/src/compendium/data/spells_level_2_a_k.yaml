  - id: augury
    name_en: Augury
    name_ru: Авгурия
    level: 2
    school: divination
    casting_time: "1 minute"
    range_ft: "Self"
    components: { v: true, s: true, m: "specially marked sticks, bones, or similar tokens worth at least 25 gp" }
    duration: "Instantaneous"
    ritual: true
    concentration: false
    classes: [cleric]
    description_en: |
      By casting gem-inlaid sticks, rolling dragon bones, laying out ornate cards, or employing some other divining tool, you receive an omen from an otherworldly entity about the results of a specific course of action that you plan to take within the next 30 minutes. The DM chooses from the following possible omens:

      - Weal, for good results
      - Woe, for bad results
      - Weal and woe, for both good and bad results
      - Nothing, for results that aren't especially good or bad

      The spell doesn't take into account any possible circumstances that might change the outcome, such as the casting of additional spells or the loss or gain of a companion. If you cast the spell two or more times before completing your next long rest, there is a cumulative 25 percent chance for each casting after the first that you get a random reading. The DM makes this roll in secret.
    description_ru: |
      Кидая палочки с самоцветами, бросая драконьи кости, раскладывая узорчатые карты или используя иной гадальный инструмент, вы получаете от потусторонней сущности знамение об итогах определённого действия, которое планируете совершить в течение ближайших 30 минут. Мастер выбирает из следующих возможных знамений:

      - Благо - для хороших результатов;
      - Горе - для плохих результатов;
      - Благо и горе - для и хороших, и плохих результатов;
      - Ничего - для результатов, которые не особенно хороши или плохи.

      Заклинание не учитывает обстоятельств, которые могут изменить итог, например наложения дополнительных заклинаний или потери либо обретения союзника. Если вы накладываете заклинание два или более раз до завершения следующего длительного отдыха, появляется кумулятивный шанс 25 процентов за каждое наложение после первого, что вы получите случайное знамение. Мастер делает этот бросок втайне.
    at_higher_levels: null
    damage: null
