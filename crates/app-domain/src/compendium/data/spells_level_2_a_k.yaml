  - id: branding-smite
    name_en: Branding Smite
    name_ru: Клеймящая кара
    level: 2
    school: evocation
    casting_time: "1 bonus action"
    range_ft: "Self"
    components: { v: true, s: false, m: null }
    duration: "Concentration, up to 1 minute"
    ritual: false
    concentration: true
    classes: [paladin]
    description_en: |
      The next time you hit a creature with a weapon attack before this spell ends, the weapon gleams with astral radiance as you strike. The attack deals an extra 2d6 radiant damage to the target, which becomes visible if it's invisible, and the target sheds dim light in a 5-foot radius and can't become invisible until the spell ends.
    description_ru: |
      В следующий раз, когда вы попадёте по существу атакой оружием до окончания заклинания, оружие при ударе вспыхивает астральным сиянием. Атака наносит цели дополнительные 2к6 урона излучением, цель становится видимой, если была невидимой, испускает тусклый свет в радиусе 5 футов и не может стать невидимой, пока заклинание не закончится.
    at_higher_levels:
      en: "When you cast this spell using a spell slot of 3rd level or higher, the extra damage increases by 1d6 for each slot level above 2nd."
      ru: "Если вы накладываете это заклинание, используя ячейку заклинания 3-го уровня или выше, дополнительный урон увеличивается на 1к6 за каждый уровень ячейки выше 2-го."
    damage: { dice: "2d6", type: radiant }
    attack: null
    save: null
    scales_with_level: upcast
    source_url: https://5thsrd.org/spellcasting/spells/branding_smite/
    srd_section: "SRD 5.1 §Spells / Branding Smite"

  - id: calm-emotions
    name_en: Calm Emotions
    name_ru: Успокоение эмоций
    level: 2
    school: enchantment
    casting_time: "1 action"
    range_ft: 60
    components: { v: true, s: true, m: null }
    duration: "Concentration, up to 1 minute"
    ritual: false
    concentration: true
    classes: [bard, cleric]
    description_en: |
      You attempt to suppress strong emotions in a group of people. Each humanoid in a 20-foot-radius sphere centered on a point you choose within range must make a Charisma saving throw; a creature can choose to fail this saving throw if it wishes. If a creature fails its saving throw, choose one of the following two effects. You can suppress any effect causing a target to be charmed or frightened. When this spell ends, any suppressed effect resumes, provided that its duration has not expired in the meantime. Alternatively, you can make a target indifferent about creatures of your choice that it is hostile toward. This indifference ends if the target is attacked or harmed by a spell or if it witnesses any of its friends being harmed. When the spell ends, the creature becomes hostile again, unless the DM rules otherwise.
    description_ru: |
      Вы пытаетесь подавить сильные эмоции в группе людей. Каждый гуманоид в сфере радиусом 20 футов с центром в выбранной вами точке в пределах дистанции должен совершить спасбросок Харизмы; существо может намеренно провалить этот спасбросок. Если существо проваливает спасбросок, выберите один из двух следующих эффектов. Вы можете подавить любой эффект, заставляющий цель быть очарованной или испуганной. Когда заклинание оканчивается, любой подавленный эффект возобновляется при условии, что его длительность к этому моменту не истекла. Либо вы можете сделать цель безразличной к выбранным вами существам, по отношению к которым она враждебна. Это безразличие оканчивается, если цель будет атакована или подвергнется вреду от заклинания, либо если она увидит, что её друзьям наносится вред. Когда заклинание оканчивается, существо снова становится враждебным, если только Мастер не решит иначе.
    at_higher_levels: null
    damage: null
    attack: null
    save: { ability: cha, half_on_success: false }
    scales_with_level: null
    source_url: https://5thsrd.org/spellcasting/spells/calm_emotions/
    srd_section: "SRD 5.1 §Spells / Calm Emotions"

  - id: continual-flame
    name_en: Continual Flame
    name_ru: Неугасимое пламя
    level: 2
    school: evocation
    casting_time: "1 action"
    range_ft: "Touch"
    components: { v: true, s: true, m: "ruby dust worth 50 gp, which the spell consumes" }
    duration: "Until dispelled"
    ritual: false
    concentration: false
    classes: [cleric, wizard]
    description_en: |
      A flame, equivalent in brightness to a torch, springs forth from an object that you touch. The effect looks like a regular flame, but it creates no heat and doesn't use oxygen. A continual flame can be covered or hidden but not smothered or quenched.
    description_ru: |
      Из предмета, которого вы касаетесь, возникает пламя, равное по яркости факелу. Эффект выглядит как обычное пламя, но не создаёт тепла и не потребляет кислород. Неугасимое пламя можно прикрыть или спрятать, но нельзя задушить или потушить.
    at_higher_levels: null
    damage: null
