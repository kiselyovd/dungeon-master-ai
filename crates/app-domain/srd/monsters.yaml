chunks:
  - key: goblin
    text: "Goblin. Small humanoid. CR 1/4. AC 15 (leather armor, shield). HP 7 (2d6). Speed 30 ft. STR 8 (-1) DEX 14 (+2) CON 10 (+0) INT 10 (+0) WIS 8 (-1) CHA 8 (-1). Skills: Stealth +6. Senses: darkvision 60 ft, passive Perception 9. Languages: Common, Goblin. Nimble Escape: The goblin can take the Disengage or Hide action as a bonus action on each of its turns. Scimitar: Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 5 (1d6+2) slashing damage. Shortbow: Ranged Weapon Attack: +4 to hit, range 80/320 ft., one target. Hit: 5 (1d6+2) piercing damage."

  - key: hobgoblin
    text: "Hobgoblin. Medium humanoid. CR 1/2. AC 18 (chain mail, shield). HP 11 (2d8+2). Speed 30 ft. STR 13 (+1) DEX 12 (+1) CON 12 (+1) INT 10 (+0) WIS 10 (+0) CHA 9 (-1). Saving Throws: none proficient. Senses: darkvision 60 ft, passive Perception 10. Languages: Common, Goblin. Martial Advantage: Once per turn, the hobgoblin can deal an extra 7 (2d6) damage to a creature it hits with a weapon attack if that creature is within 5 feet of an ally of the hobgoblin that isn't incapacitated. Longsword: Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: 5 (1d8+1) slashing damage. Longbow: Ranged Weapon Attack: +3 to hit, range 150/600 ft., one target. Hit: 5 (1d8+1) piercing damage."

  - key: skeleton
    text: "Skeleton. Medium undead. CR 1/4. AC 13 (armor scraps). HP 13 (2d8+4). Speed 30 ft. STR 10 (+0) DEX 14 (+2) CON 15 (+2) INT 6 (-2) WIS 8 (-1) CHA 5 (-3). Damage Vulnerabilities: bludgeoning. Damage Immunities: poison. Condition Immunities: exhaustion, poisoned. Senses: darkvision 60 ft, passive Perception 9. Languages: understands languages it knew in life but can't speak. Shortsword: Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 5 (1d6+2) piercing damage. Shortbow: Ranged Weapon Attack: +4 to hit, range 80/320 ft., one target. Hit: 5 (1d6+2) piercing damage."

  - key: zombie
    text: "Zombie. Medium undead. CR 1/4. AC 8. HP 22 (3d8+9). Speed 20 ft. STR 13 (+1) DEX 6 (-2) CON 16 (+3) INT 3 (-4) WIS 6 (-2) CHA 5 (-3). Saving Throws: WIS +0. Damage Immunities: poison. Condition Immunities: poisoned. Senses: darkvision 60 ft, passive Perception 8. Languages: understands languages it knew in life but can't speak. Undead Fortitude: If damage reduces the zombie to 0 hit points, it must make a CON saving throw with a DC of 5 + the damage taken, unless the damage is radiant or from a critical hit. On success, the zombie drops to 1 hit point instead. Slam: Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: 4 (1d6+1) bludgeoning damage."

  - key: wolf
    text: "Wolf. Medium beast. CR 1/4. AC 13 (natural armor). HP 11 (2d8+2). Speed 40 ft. STR 12 (+1) DEX 15 (+2) CON 12 (+1) INT 3 (-4) WIS 12 (+1) CHA 6 (-2). Skills: Perception +3, Stealth +4. Senses: passive Perception 13. Keen Hearing and Smell: Advantage on Perception checks that rely on hearing or smell. Pack Tactics: Advantage on attack rolls against a creature if at least one of the wolf's allies is within 5 ft. of the creature and the ally isn't incapacitated. Bite: Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 7 (2d4+2) piercing damage. If the target is a creature, it must succeed on a DC 11 STR saving throw or be knocked prone."

  - key: giant_spider
    text: "Giant Spider. Large beast. CR 1. AC 14 (natural armor). HP 26 (4d10+4). Speed 30 ft., climb 30 ft. STR 14 (+2) DEX 16 (+3) CON 12 (+1) INT 2 (-4) WIS 11 (+0) CHA 4 (-3). Skills: Stealth +7. Senses: blindsight 10 ft., darkvision 60 ft., passive Perception 10. Spider Climb: Can climb difficult surfaces including upside down on ceilings without an ability check. Web Sense: While in contact with a web, knows exact location of any creature in contact with the same web. Bite: Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 7 (1d8+3) piercing damage, and the target must make a DC 11 CON saving throw, taking 9 (2d8) poison damage on a failed save, or half as much on success. If the poison damage reduces to 0 HP, the target is stable but poisoned for 1 hour, even if it regains HP, and is paralyzed while poisoned this way."

  - key: bandit
    text: "Bandit. Medium humanoid. CR 1/8. AC 12 (leather armor). HP 11 (2d8+2). Speed 30 ft. STR 11 (+0) DEX 12 (+1) CON 12 (+1) INT 10 (+0) WIS 10 (+0) CHA 10 (+0). Senses: passive Perception 10. Languages: any one language (usually Common). Scimitar: Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: 4 (1d6+1) slashing damage. Light Crossbow: Ranged Weapon Attack: +3 to hit, range 80/320 ft., one target. Hit: 5 (1d8+1) piercing damage."

  - key: dire_wolf
    text: "Dire Wolf. Large beast. CR 1. AC 14 (natural armor). HP 37 (5d10+10). Speed 50 ft. STR 17 (+3) DEX 15 (+2) CON 15 (+2) INT 3 (-4) WIS 12 (+1) CHA 7 (-2). Skills: Perception +3, Stealth +4. Senses: passive Perception 13. Keen Hearing and Smell: Advantage on Perception checks relying on hearing or smell. Pack Tactics: Advantage on attack rolls against a creature if at least one non-incapacitated ally is within 5 ft of the creature. Bite: Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 10 (2d6+3) piercing damage. If the target is a creature, it must succeed on a DC 13 STR saving throw or be knocked prone."

  - key: orc
    text: "Orc. Medium humanoid. CR 1/2. AC 13 (hide armor). HP 15 (2d8+6). Speed 30 ft. STR 16 (+3) DEX 12 (+1) CON 16 (+3) INT 7 (-2) WIS 11 (+0) CHA 10 (+0). Skills: Intimidation +2. Senses: darkvision 60 ft, passive Perception 10. Languages: Common, Orc. Aggressive: As a bonus action, the orc can move up to its speed toward a hostile creature that it can see. Greataxe: Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: 9 (1d12+3) slashing damage. Javelin: Melee or Ranged Weapon Attack: +5 to hit, reach 5 ft. or range 30/120 ft., one target. Hit: 6 (1d6+3) piercing damage."

  - key: cultist
    text: "Cultist. Medium humanoid. CR 1/8. AC 12 (leather armor). HP 9 (2d8). Speed 30 ft. STR 11 (+0) DEX 12 (+1) CON 10 (+0) INT 10 (+0) WIS 11 (+0) CHA 10 (+0). Skills: Deception +2, Religion +2. Senses: passive Perception 10. Languages: any one language. Dark Devotion: The cultist has advantage on saving throws against being charmed or frightened. Scimitar: Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: 4 (1d6+1) slashing damage."

  - key: guard
    text: "Guard. Medium humanoid. CR 1/8. AC 16 (chain shirt, shield). HP 11 (2d8+2). Speed 30 ft. STR 13 (+1) DEX 12 (+1) CON 12 (+1) INT 10 (+0) WIS 11 (+0) CHA 10 (+0). Skills: Perception +2. Senses: passive Perception 12. Languages: any one language (usually Common). Spear: Melee or Ranged Weapon Attack: +3 to hit, reach 5 ft. or range 20/60 ft., one target. Hit: 4 (1d6+1) piercing damage or 5 (1d8+1) when used two-handed."

  - key: giant_rat
    text: "Giant Rat. Small beast. CR 1/8. AC 12. HP 7 (2d6). Speed 30 ft. STR 7 (-2) DEX 15 (+2) CON 11 (+0) INT 2 (-4) WIS 10 (+0) CHA 4 (-3). Senses: darkvision 30 ft, passive Perception 10. Keen Smell: Advantage on Perception checks relying on smell. Pack Tactics: Advantage on attack rolls against a creature if at least one non-incapacitated ally is within 5 ft. Bite: Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 4 (1d4+2) piercing damage."

  - key: kobold
    text: "Kobold. Small humanoid. CR 1/8. AC 12. HP 5 (2d6-2). Speed 30 ft. STR 7 (-2) DEX 15 (+2) CON 9 (-1) INT 8 (-1) WIS 7 (-2) CHA 8 (-1). Senses: darkvision 60 ft, passive Perception 8. Sunlight Sensitivity: Disadvantage on attack rolls and Perception checks relying on sight when in sunlight. Pack Tactics: Advantage on attack rolls against a creature if at least one non-incapacitated ally is within 5 ft. Dagger: Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 4 (1d4+2) piercing damage. Sling: Ranged Weapon Attack: +4 to hit, range 30/120 ft., one target. Hit: 4 (1d4+2) bludgeoning damage."

  - key: ghoul
    text: "Ghoul. Medium undead. CR 1. AC 12. HP 22 (5d8). Speed 30 ft. STR 13 (+1) DEX 15 (+2) CON 10 (+0) INT 7 (-2) WIS 10 (+0) CHA 6 (-2). Damage Immunities: poison. Condition Immunities: charmed, exhaustion, poisoned. Senses: darkvision 60 ft, passive Perception 10. Claws: Melee Weapon Attack: +2 to hit, reach 5 ft., one target. Hit: 7 (2d6) slashing damage. If target is not undead, must succeed on DC 10 CON saving throw or be paralyzed for 1 minute. Target can repeat save at end of each turn. Bite: Melee Weapon Attack: +2 to hit, reach 5 ft., one target not incapacitated. Hit: 9 (2d6+2) piercing damage."

  - key: stirge
    text: "Stirge. Tiny beast. CR 1/8. AC 14 (natural armor). HP 2 (1d4). Speed 10 ft., fly 40 ft. STR 4 (-3) DEX 16 (+3) CON 11 (+0) INT 2 (-4) WIS 8 (-1) CHA 6 (-2). Senses: darkvision 60 ft, passive Perception 9. Blood Drain: Melee Weapon Attack: +5 to hit, reach 5 ft., one creature. Hit: 5 (1d4+3) piercing damage, and the stirge attaches to the target. While attached, the stirge doesn't attack. Instead, at the start of each of the stirge's turns, the target loses 5 (1d4+3) HP due to blood loss. The stirge can detach itself by spending 5 feet of movement. It does so after it drains 10 HP or the target dies. A creature can detach the stirge as an action with a DC 11 STR check."
