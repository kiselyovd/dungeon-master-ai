chunks:
  - key: class_fighter
    text: "Fighter (D&D 5e SRD). Hit Die: d10. Primary Ability: Strength or Dexterity. Saves: Strength, Constitution. Armor: all armor, shields. Weapons: simple weapons, martial weapons. Level 1 features: Fighting Style (pick one: Archery +2 ranged attack rolls, Defense +1 AC in armor, Dueling +2 damage one-handed with no other hand weapon, Great Weapon Fighting reroll 1/2 on damage dice for two-handed, Protection impose disadvantage via reaction, Two-Weapon Fighting add ability mod to off-hand attack damage); Second Wind (bonus action, regain 1d10+fighter level HP, once per short rest). Level 2: Action Surge (take one additional action on your turn, once per short rest, twice per long rest at level 17). Level 5: Extra Attack (attack twice instead of once when taking the Attack action)."

  - key: class_rogue
    text: "Rogue (D&D 5e SRD). Hit Die: d8. Primary Ability: Dexterity. Saves: Dexterity, Intelligence. Armor: light armor. Weapons: simple weapons, hand crossbows, longswords, rapiers, shortswords. Level 1 features: Expertise (double proficiency bonus for two skills at 1st level, two more at 6th); Sneak Attack (once per turn, deal extra damage when you have advantage on the attack roll or when an ally is adjacent to target - not incapacitated; 1d6 at level 1, increasing by 1d6 every odd level); Thieves' Cant (secret language). Level 2: Cunning Action (bonus action to Dash, Disengage, or Hide). Level 5: Uncanny Dodge (use reaction to halve attack damage from a visible attacker)."

  - key: class_wizard
    text: "Wizard (D&D 5e SRD). Hit Die: d6. Primary Ability: Intelligence. Saves: Intelligence, Wisdom. Armor: none. Weapons: daggers, darts, slings, quarterstaffs, light crossbows. Spellcasting: Intelligence modifier for spell save DC and spell attack bonus. Spell slots by level: L1 has 2 slots for 1st-level spells. Spellbook: start with 6 1st-level spells; add 2 per level gained. Can copy spells from scrolls and other spellbooks (1 hour and 50 gp per level). Level 1 features: Arcane Recovery (regain spell slots on short rest totaling up to half wizard level rounded up, once per day). Arcane Tradition chosen at level 2 (e.g., School of Evocation, Abjuration, Illusion)."

  - key: class_cleric
    text: "Cleric (D&D 5e SRD). Hit Die: d8. Primary Ability: Wisdom. Saves: Wisdom, Charisma. Armor: light and medium armor, shields. Weapons: simple weapons. Spellcasting: Wisdom modifier for spell save DC and spell attack bonus. Clerics prepare a list of spells each day from the cleric spell list (can prepare Wisdom modifier + Cleric level spells). Spell slots same as full caster table. Level 1 features: Divine Domain (subclass chosen at 1st level); Channel Divinity: Turn Undead (use as action, each undead within 30 ft makes a WIS save DC 8 + proficiency + WIS mod or is turned for 1 minute; turned creature must move away and can't move closer, can't take reactions or actions other than Dash); Channel Divinity charges refresh on short rest (one charge at levels 1-6, two at levels 6+). Level 2: Channel Divinity domain feature."
